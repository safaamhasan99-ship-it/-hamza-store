<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المفضلة | مجمع حمزة الشطري</title>

<style>
body{
font-family:Tahoma,sans-serif;
background:#f5f5f5;
margin:0;
}

header{
background:#000;
color:#fff;
padding:20px;
text-align:center;
font-size:26px;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:#fff;
border-radius:12px;
overflow:hidden;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card h3{
padding:10px;
margin:0;
}

.card p{
padding:0 10px 10px;
color:#009688;
font-weight:bold;
}

button{
width:100%;
padding:12px;
background:red;
color:white;
border:none;
cursor:pointer;
font-size:16px;
}

.empty{
text-align:center;
padding:50px;
font-size:22px;
color:#777;
}
</style>
</head>

<body>

<header>❤️ المنتجات المفضلة</header>

<div class="container" id="favorites"></div>

<script>

let favorites = JSON.parse(localStorage.getItem("favorites")) || [];

const container = document.getElementById("favorites");

function loadFavorites(){

container.innerHTML="";

if(favorites.length===0){

container.innerHTML='<div class="empty">لا توجد منتجات في المفضلة</div>';

return;

}

favorites.forEach((item,index)=>{

container.innerHTML+=`

<div class="card">

<img src="${item.image}" alt="">

<h3>${item.name}</h3>

<p>${item.price} د.ع</p>

<button onclick="removeFavorite(${index})">

حذف من المفضلة

</button>

</div>

`;

});

}

function removeFavorite(index){

favorites.splice(index,1);

localStorage.setItem("favorites",JSON.stringify(favorites));

loadFavorites();

}

loadFavorites();

</script>

</body>
</html>
