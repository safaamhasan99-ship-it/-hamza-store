<script src="script.js"></script>



<script>


let favorites = JSON.parse(localStorage.getItem("favorites")) || [];


let box = document.getElementById("favoritesBox");



function showFavorites(){


box.innerHTML="";



if(favorites.length === 0){


box.innerHTML = `


<div class="about-box">


<h2>
لا توجد منتجات مفضلة ❤️
</h2>


<a href="products.html" class="wholesale">

تصفح المنتجات

</a>


</div>


`;


return;


}




favorites.forEach((item,index)=>{



box.innerHTML += `



<div class="product-card">


<img src="${item.image}">



<div class="product-info">



<h3>

${item.name}

</h3>



<p class="price">

${item.price} د.ع

</p>




<button class="cart-btn"

onclick="addToCart('${item.name}',${item.price},'${item.image}')">

🛒 إضافة للسلة

</button>




<button class="details-btn"

onclick="openProduct('${item.name}',${item.price},'${item.image}')">

👁 عرض التفاصيل

</button>




<button class="favorite"

onclick="removeFavorite(${index})">

❌ حذف من المفضلة

</button>



</div>


</div>



`;



});


}




function removeFavorite(index){


favorites.splice(index,1);


localStorage.setItem("favorites",JSON.stringify(favorites));


showFavorites();


}



showFavorites();


updateCartCount();



</script>
