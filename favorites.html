<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>المفضلة | مجمع حمزه الشطري</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>


<body>



<header class="header">


<div class="brand">


<img src="5FBF3B90-553B-424D-A9B1-1BE2F7F9362B.png">


<div>

<h1>
مجمع حمزه الشطري
</h1>

<p>
المنتجات المفضلة
</p>


</div>


</div>


</header>





<section class="products">


<h2 class="title">
❤️ المفضلة
</h2>


<div class="products-grid" id="favoritesBox">


</div>


</section>





<nav class="bottom-nav">


<a href="index.html">
🏠 الرئيسية
</a>


<a href="products.html">
🛍 المنتجات
</a>


<a href="cart.html">
🛒 السلة
</a>


<a href="favorites.html">
❤️ المفضلة
</a>


</nav>





<script src="script.js"></script>


<script>


let favorites = JSON.parse(localStorage.getItem("favorites")) || [];


let box = document.getElementById("favoritesBox");



if(favorites.length === 0){


box.innerHTML = `

<div class="about-box">

<h2>
لا توجد منتجات مفضلة ❤️
</h2>

</div>

`;


}else{



favorites.forEach(item=>{


box.innerHTML += `


<div class="product-card">


<img src="${item.image}">


<div class="product-info">


<h3>${item.name}</h3>


<p class="price">
${item.price} د.ع
</p>



<button class="cart-btn"

onclick="addToCart('${item.name}',${item.price},'${item.image}')">

🛒 إضافة للسلة

</button>



</div>


</div>



`;



});



}


</script>


</body>

</html>
