<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>المفضلة - مجمع حمزه الشطري</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}


body{
background:#111;
color:white;
}


header{

background:#000;
padding:20px;
text-align:center;
border-bottom:2px solid gold;

}


header h1{

color:gold;

}


.menu{

background:#222;
padding:15px;
text-align:center;

}


.menu a{

color:white;
text-decoration:none;
margin:10px;

}



#favorites{

padding:20px;

}



.item{

background:#222;
border-radius:15px;
padding:15px;
margin-bottom:15px;
display:flex;
align-items:center;
gap:15px;

}



.item img{

width:100px;
height:100px;
object-fit:cover;
border-radius:10px;

}



.price{

color:#00ff99;
font-weight:bold;

}



button{

background:#e91e63;
color:white;
border:none;
padding:10px;
border-radius:20px;
cursor:pointer;

}



footer{

background:#000;
text-align:center;
padding:20px;
margin-top:30px;

}



@media(max-width:600px){

.item{

flex-direction:column;
text-align:center;

}

}

</style>

</head>


<body>


<header>

<h1>❤️ المنتجات المفضلة</h1>

<p>مجمع حمزه الشطري</p>

</header>



<div class="menu">

<a href="index.html">🏠 الرئيسية</a>

<a href="cart.html">🛒 السلة</a>

</div>



<div id="favorites"></div>



<footer>

<p>ذي قار - الشطرة</p>

<p>📞 07813555538</p>

</footer>




<script>


let box=document.getElementById("favorites");


let favorites=JSON.parse(localStorage.getItem("favorites")) || [];



if(favorites.length==0){

box.innerHTML="<h2 style='text-align:center;color:gold'>لا توجد منتجات مفضلة</h2>";

}



favorites.forEach(function(item,index){


box.innerHTML += `

<div class="item">

<img src="${item.image}">

<div>

<h2>${item.name}</h2>

<p class="price">${item.price}</p>

<button onclick="removeFavorite(${index})">
حذف
</button>

</div>

</div>

`;

});




function removeFavorite(index){

favorites.splice(index,1);

localStorage.setItem("favorites",JSON.stringify(favorites));

location.reload();

}


</script>



</body>

</html>
