<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>المفضلة - مجمع حمزه الشطري</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#111;
color:white;
}


header{
background:#000;
padding:20px;
text-align:center;
border-bottom:3px solid gold;
}

header h1{
color:gold;
}


.menu{
background:#222;
padding:15px;
text-align:center;
}

.menu a{
color:white;
text-decoration:none;
margin:10px;
}


.container{
width:95%;
margin:auto;
padding:20px;
}


.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:20px;
}


.card{
background:#222;
padding:15px;
border-radius:15px;
text-align:center;
}


.card img{
width:100%;
height:230px;
object-fit:cover;
border-radius:10px;
}


.card h2{
color:gold;
margin:10px;
}


.price{
color:#00ff99;
font-weight:bold;
}


.btn{
display:block;
padding:12px;
margin-top:10px;
border-radius:25px;
text-decoration:none;
font-weight:bold;
}


.order{
background:#25D366;
color:white;
}


.delete{
background:#e91e63;
color:white;
border:none;
width:100%;
cursor:pointer;
}



footer{
background:#000;
padding:25px;
text-align:center;
margin-top:30px;
}


@media(max-width:600px){

.products{
grid-template-columns:1fr;
}

}

</style>

</head>


<body>


<header>

<h1>مجمع حمزه الشطري</h1>

<p>❤️ المنتجات المفضلة</p>

</header>



<div class="menu">

<a href="index.html">🏠 الرئيسية</a>

<a href="products.html">🛒 المنتجات</a>

<a href="cart.html">🛒 السلة</a>

</div>




<div class="container">

<div class="products" id="favoritesList"></div>

</div>




<footer>

<p>📍 ذي قار - الشطرة</p>

<p>📞 07813555538</p>

</footer>





<script>


let favorites = JSON.parse(localStorage.getItem("favorites")) || [];


let list=document.getElementById("favoritesList");



function showFavorites(){


list.innerHTML="";


if(favorites.length===0){

list.innerHTML="<h2 style='color:gold;text-align:center'>لا توجد منتجات مفضلة</h2>";

return;

}



favorites.forEach((item,index)=>{


list.innerHTML += `

<div class="card">

<img src="${item.image}">

<h2>${item.name}</h2>

<p class="price">${Number(item.price).toLocaleString()} د.ع</p>


<a class="btn order" href="https://wa.me/9647813555538">

💬 اطلب الآن

</a>


<button class="btn delete" onclick="removeFavorite(${index})">

حذف من المفضلة

</button>


</div>

`;

});


}



function removeFavorite(index){

favorites.splice(index,1);

localStorage.setItem("favorites",JSON.stringify(favorites));

showFavorites();

}


showFavorites();


</script>


</body>

</html>
