<div class="header-icons">

<a href="favorites.html" class="header-btn">

</button>

<option value="men">رجالي</option>

<option value="women">نسائي</option>

<option value="boys">ولادي</option>

<option value="pants">بنطرونات</option>

<option value="socks">جوارب</option>

<option value="underwear">داخليات</option>

<option value="hijabs">حجابات</option>

</select>

<select id="sortProducts">

<option value="new">الأحدث</option>

<option value="low">السعر الأقل</option>

<option value="high">السعر الأعلى</option>

<option value="name">الاسم</option>

</select>

</section>

<section class="products-section">

<div
id="productsContainer"
class="products-grid">
