<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إدارة المنتجات | مجمع حمزه الشطري</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f4f6f9;
}

header{
background:#111;
color:#FFC107;
padding:18px;
text-align:center;
font-size:26px;
font-weight:bold;
}

.container{
max-width:1200px;
margin:30px auto;
padding:20px;
}

.form-box{

background:#fff;
padding:25px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
margin-bottom:35px;

}

.form-box h2{

margin-bottom:20px;
color:#222;

}

.form-group{

margin-bottom:15px;

}

.form-group label{

display:block;
margin-bottom:8px;
font-weight:bold;

}

.form-group input,
.form-group select,
.form-group textarea{

width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:10px;
font-size:15px;

}

textarea{

height:110px;
resize:none;

}

button{

background:#FFC107;
border:none;
padding:14px 30px;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;

}

button:hover{

background:#e0a800;

}

.products{

display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
gap:20px;

}

.card{

background:#fff;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 20px rgba(0,0,0,.08);

}

.card img{

width:100%;
height:240px;
object-fit:cover;

}

.card-body{

padding:18px;

}

.card-body h3{

margin-bottom:10px;

}

.price{

color:#FFC107;
font-size:22px;
font-weight:bold;

}

.category{

margin-top:8px;
color:#666;

}

.actions{

display:flex;
gap:10px;
margin-top:15px;

}

.delete{

background:#e53935;
color:#fff;

}

.edit{

background:#2196F3;
color:#fff;

}

</style>

</head>

<body>

<header>

إدارة منتجات مجمع حمزه الشطري

</header>

<div class="container">

<div class="form-box">

<h2>إضافة منتج جديد</h2>

<div class="form-group">

<label>اسم المنتج</label>

<input type="text" id="name">

</div>

<div class="form-group">

<label>السعر</label>

<input type="number" id="price">

</div>

<div class="form-group">

<label>القسم</label>

<select id="category">

<option>رجالي</option>
<option>نسائي</option>
<option>ولادي</option>
<option>بناتي</option>
<option>جوارب</option>
<option>بنطرونات</option>
<option>داخليات رجالي</option>

</select>

</div>

<div class="form-group">

<label>وصف المنتج</label>

<textarea id="description"></textarea>

</div>

<div class="form-group">

<label>رابط الصورة</label>

<input type="text" id="image">

</div>

<button id="saveBtn">

إضافة المنتج

</button>

</div>

<div id="products" class="products">

</div>

</div>
<script type="module">

import { db } from "./js/firebase.js";

import {
collection,
addDoc,
getDocs,
deleteDoc,
doc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const productsRef = collection(db,"products");

const productsContainer = document.getElementById("products");

async function loadProducts(){

productsContainer.innerHTML="";

const snapshot = await getDocs(productsRef);

snapshot.forEach((item)=>{

const product=item.data();

productsContainer.innerHTML += `

<div class="card">

<img src="${product.image}" alt="">

<div class="card-body">

<h3>${product.name}</h3>

<div class="price">${product.price} د.ع</div>

<div class="category">${product.category}</div>

<p>${product.description}</p>

<div class="actions">

<button class="edit">تعديل</button>

<button class="delete" onclick="removeProduct('${item.id}')">

حذف

</button>

</div>

</div>

</div>

`;

});

}

window.removeProduct = async(id)=>{

await deleteDoc(doc(db,"products",id));

loadProducts();

};

loadProducts();
  // إضافة منتج جديد إلى Firebase

document.getElementById("saveBtn").addEventListener("click", async () => {

    const name = document.getElementById("name").value.trim();
    const price = document.getElementById("price").value.trim();
    const category = document.getElementById("category").value;
    const description = document.getElementById("description").value.trim();
    const image = document.getElementById("image").value.trim();

    if (!name || !price || !image) {
        alert("يرجى ملء جميع الحقول المطلوبة");
        return;
    }

    try {

        await addDoc(productsRef, {
            name,
            price: Number(price),
            category,
            description,
            image,
            createdAt: new Date()
        });

        document.getElementById("name").value = "";
        document.getElementById("price").value = "";
        document.getElementById("description").value = "";
        document.getElementById("image").value = "";
        document.getElementById("category").selectedIndex = 0;

        alert("تمت إضافة المنتج بنجاح");

        loadProducts();

    } catch (error) {

        console.error(error);
        alert("حدث خطأ أثناء حفظ المنتج");

    }

});
  <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap">

<input
id="search"
type="text"
placeholder="ابحث عن منتج..."
style="flex:1;padding:12px;border:1px solid #ddd;border-radius:10px;">

<button id="refreshBtn">
تحديث
</button>

</div>
