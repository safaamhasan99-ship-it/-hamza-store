<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>جميع المنتجات | مجمع حمزه الشطري</title>

<link rel="stylesheet" href="css/style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

  <!-- أدوات الفلترة -->

<section class="filters">

<div class="filter-box">

<select id="categoryFilter">

<option value="">جميع الأقسام</option>

<option value="رجالي">رجالي</option>

<option value="نسائي">نسائي</option>

<option value="ولادي">ولادي</option>

<option value="بناتي">بناتي</option>

<option value="بنطرونات">بنطرونات</option>

<option value="جوارب">جوارب</option>

<option value="حجابات">حجابات</option>

<option value="داخليات">داخليات</option>

</select>

<select id="sortProducts">

<option value="new">الأحدث</option>

<option value="low">السعر: الأقل أولاً</option>

<option value="high">السعر: الأعلى أولاً</option>

<option value="name">الاسم</option>

</select>

</div>

</section>



<!-- عنوان الصفحة -->

<section class="section-head">

<h2>

جميع المنتجات

</h2>

<p>

اكتشف أحدث موديلات مجمع حمزه الشطري

</p>

</section>



<!-- المنتجات -->

<section class="products-section">

<div
id="productsContainer"
class="products-grid">

<!-- يتم تحميل المنتجات من Firebase -->

</div>

</section>



<!-- زر العودة للأعلى -->

<button
class="scroll-top">

<i class="fa-solid fa-arrow-up"></i>

</button>



<!-- شريط التنقل السفلي -->

<nav class="bottom-nav">

<a href="index.html">

<i class="fa-solid fa-house"></i>

<span>الرئيسية</span>

</a>

<a href="products.html" class="active">

<i class="fa-solid fa-store"></i>

<span>المنتجات</span>

</a>

<a href="favorites.html">

<i class="fa-regular fa-heart"></i>

<span>المفضلة</span>

</a>

<a href="cart.html">

<i class="fa-solid fa-cart-shopping"></i>

<span>السلة</span>

</a>

</nav>



<script type="module" src="js/app.js"></script>

</body>

</html>
<!-- Product Template -->

<template id="productTemplate">

<div class="product-card fade-up">

<div class="product-image">

<img class="product-img"
src=""
alt=""
loading="lazy">

<div class="product-badges">

<span class="badge new">

جديد

</span>

<span class="badge stock">

متوفر

</span>

</div>

<button class="favorite-btn">

<i class="fa-regular fa-heart"></i>

</button>

</div>

<div class="product-content">

<h3 class="product-name">

اسم المنتج

</h3>

<div class="rating">

<i class="fa-solid fa-star"></i>
<i class="fa-solid fa-star"></i>
<i class="fa-solid fa-star"></i>
<i class="fa-solid fa-star"></i>
<i class="fa-solid fa-star-half-stroke"></i>

<span>4.9</span>

</div>

<div class="price-box">

<span class="price">

0 د.ع

</span>

<span class="old-price">

</span>

</div>

<div class="product-buttons">

<button class="details-btn">

<i class="fa-solid fa-eye"></i>

عرض

</button>

<button class="cart-btn">

<i class="fa-solid fa-cart-shopping"></i>

إضافة للسلة

</button>

</div>

</div>

</div>

</template>

<!-- Toast -->

<div class="toast">

تمت إضافة المنتج إلى السلة

</div>

<!-- Loading -->

<div id="loadingProducts"

style="display:none"

class="loading">

جاري تحميل المنتجات...

</div>
