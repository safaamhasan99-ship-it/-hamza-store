<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تفاصيل المنتج - مجمع حمزه الشطري</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#111;
color:white;
}

header{
background:#000;
padding:20px;
text-align:center;
border-bottom:3px solid gold;
}

header h1{
color:gold;
}

.menu{
background:#222;
padding:15px;
text-align:center;
}

.menu a{
color:white;
text-decoration:none;
margin:10px;
}

.container{
padding:20px;
}

.product{
background:#222;
padding:20px;
border-radius:15px;
text-align:center;
max-width:500px;
margin:auto;
}

.product img{
width:100%;
border-radius:15px;
}

h2{
color:gold;
margin:15px;
}

.price{
color:#00ff99;
font-size:22px;
font-weight:bold;
}

.btn{
display:block;
padding:12px;
margin-top:10px;
border-radius:25px;
text-decoration:none;
font-weight:bold;
border:none;
width:100%;
cursor:pointer;
}

.cart{
background:gold;
color:#000;
}

.favorite{
background:#e91e63;
color:white;
}

.whatsapp{
background:#25D366;
color:white;
}


footer{
background:#000;
text-align:center;
padding:25px;
margin-top:30px;
}

</style>

</head>


<body>


<header>

<h1>مجمع حمزه الشطري</h1>

<p>تفاصيل المنتج</p>

</header>



<div class="menu">

<a href="index.html">🏠 الرئيسية</a>

<a href="products.html">🛒 المنتجات</a>

<a href="cart.html">🛒 السلة</a>

</div>



<div class="container">


<div class="product">


<img id="productImage" src="IMG_5661.jpeg">


<h2 id="productName">
منتج جديد
</h2>


<p class="price" id="productPrice">
90000 د.ع
</p>



<button class="btn cart" onclick="addCart()">
🛒 أضف للسلة
</button>



<button class="btn favorite" onclick="addFav()">
❤️ إضافة للمفضلة
</button>



<a class="btn whatsapp" href="https://wa.me/9647813555538">
💬 اطلب واتساب
</a>



</div>


</div>




<footer>

<h3>مجمع حمزه الشطري</h3>

<p>📍 ذي قار - الشطرة</p>

<p>📞 07813555538</p>

</footer>



<script>


let product={

name:"القسم الرجالي",

price:"90000",

image:"IMG_5661.jpeg"

};



function addCart(){

let cart=JSON.parse(localStorage.getItem("cart")) || [];


cart.push({

name:product.name,

price:product.price,

image:product.image,

quantity:1

});


localStorage.setItem("cart",JSON.stringify(cart));


alert("🛒 تمت إضافة المنتج للسلة");

}




function addFav(){

let favorites=JSON.parse(localStorage.getItem("favorites")) || [];


favorites.push(product);


localStorage.setItem("favorites",JSON.stringify(favorites));


alert("❤️ تمت الإضافة للمفضلة");

}


</script>



</body>

</html>
