<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>تفاصيل المنتج | مجمع حمزه الشطري</title>


<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">


<link rel="stylesheet" href="style.css">


<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


<style>

.details-page{

max-width:600px;
margin:30px auto;
padding:20px;

}


.details-card{

background:white;
border-radius:20px;
padding:20px;
text-align:center;

}


.details-card img{

width:100%;
height:400px;
object-fit:contain;
border-radius:15px;

}


.details-card h1{

font-size:28px;
margin:15px 0;

}


.details-price{

font-size:25px;
font-weight:bold;

}


.details-buttons{

display:flex;
gap:10px;
margin-top:20px;

}


.details-buttons button,
.details-buttons a{

flex:1;
padding:14px;
border-radius:12px;
border:none;
text-decoration:none;
cursor:pointer;
font-size:16px;

}


.loading{

text-align:center;
font-size:22px;
padding:40px;

}


</style>


</head>



<body>



<header class="header">


<div class="brand">


<img src="5FBF3B90-553B-424D-A9B1-1BE2F7F9362B.png">


<div>

<h1>
مجمع حمزه الشطري
</h1>


<p>
تفاصيل المنتج
</p>


</div>


</div>




<div class="header-icons">


<a href="cart.html">

🛒

<span id="cartCount">0</span>

</a>



<button onclick="toggleDarkMode()">

🌙

</button>


</div>


</header>






<section class="details-page">


<div id="productDetails" class="details-card">


<div class="loading">

جاري تحميل المنتج...

</div>


</div>


</section>






<nav class="bottom-nav">


<a href="index.html">
🏠 الرئيسية
</a>


<a href="favorites.html">
❤️ المفضلة
</a>


<a href="cart.html">
🛒 السلة
</a>


<a href="about.html">
ℹ️ من نحن
</a>


</nav>






<script src="script.js"></script>

<script src="cart.js"></script>





<script type="module">


import { db } from "./firebase.js";


import {

doc,
getDoc

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";





const box=document.getElementById("productDetails");



const params=new URLSearchParams(location.search);


const id=params.get("id");





async function loadProduct(){


try{



if(!id){


box.innerHTML="لا يوجد منتج";

return;


}




const ref=doc(db,"products",id);



const snap=await getDoc(ref);





if(!snap.exists()){


box.innerHTML="المنتج غير موجود";

return;


}




const p=snap.data();





box.innerHTML=`



<img src="${p.image || 'https://via.placeholder.com/400'}">



<h1>

${p.name || "بدون اسم"}

</h1>



<p>

${p.description || "لا يوجد وصف"}

</p>




<div class="details-price">

${Number(p.price || 0).toLocaleString()} د.ع

</div>




<div class="details-buttons">



<button onclick="addToCart(

'${(p.name || '').replace(/'/g,"\\'")}',

${Number(p.price || 0)},

'${p.image || ''}'

)">

🛒 إضافة للسلة

</button>





<button onclick="addToFavorites(

'${(p.name || '').replace(/'/g,"\\'")}',

${Number(p.price || 0)},

'${p.image || ''}'

)">

❤️

</button>



</div>





<a href="https://wa.me/9647813555538?text=السلام عليكم أريد طلب ${p.name}"

target="_blank">

📱 طلب عبر واتساب

</a>



`;



}

catch(error){


console.error(error);


box.innerHTML="حدث خطأ في تحميل المنتج";


}



}




loadProduct();



</script>



</body>

</html>
