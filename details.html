<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تفاصيل المنتج | مجمع حمزه الشطري</title>


<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">


</head>


<body>



<header class="header">

<div class="brand">

<img src="5FBF3B90-553B-424D-A9B1-1BE2F7F9362B.png">


<div>

<h1>
مجمع حمزه الشطري
</h1>

<p>
تفاصيل المنتج
</p>

</div>

</div>

</header>





<section class="products">

<div id="productDetails">

</div>

</section>






<nav class="bottom-nav">


<a href="index.html">
🏠 الرئيسية
</a>


<a href="products.html">
🛍 المنتجات
</a>


<a href="cart.html">
🛒 السلة
</a>


<a href="favorites.html">
❤️ المفضلة
</a>


<a href="about.html">
ℹ️ من نحن
</a>


</nav>






<script src="script.js"></script>





<script>


let product =
JSON.parse(localStorage.getItem("product"));



let box =
document.getElementById("productDetails");




if(product){



box.innerHTML = `


<div class="details-page">



<div class="details-image">


<img src="${product.image}" alt="${product.name}">


</div>





<div class="details-content">


<h2>

${product.name}

</h2>




<p class="price">

${Number(product.price).toLocaleString()} د.ع

</p>




<p class="stock">

✅ متوفر للبيع بالجملة

</p>




<p class="description">

منتج أصلي بجودة عالية.
<br>
متوفر لدى مجمع حمزه الشطري.
<br>
البيع بالجملة فقط.
<br>
التوصيل متوفر لجميع محافظات العراق.

</p>





<div class="qty-box">


<label>
الكمية
</label>


<input 
type="number"
id="qty"
value="1"
min="1">


</div>






<div class="size-box">


<label>
القياس
</label>


<select id="size">


<option>
اختر القياس
</option>


<option>
بيبي
</option>


<option>
ولادي
</option>


<option>
شبابي
</option>


<option>
نسائي
</option>


<option>
كبير
</option>


</select>


</div>






<div class="details-buttons">





<button 
class="cart-btn"
onclick="addCartQty()">


🛒 إضافة إلى السلة


</button>







<button
class="fav-btn"
onclick="addToFavorites(
'${product.name}',
${product.price},
'${product.image}'
)">


❤️ إضافة للمفضلة


</button>







<a 
class="wholesale"
target="_blank"
href="https://wa.me/9647813555538?text=${encodeURIComponent(
'السلام عليكم، أرغب بطلب المنتج:\n\n'
+
product.name
+
'\nالسعر: '
+
product.price
+
' د.ع'
)}">


💬 طلب عبر واتساب


</a>




</div>


</div>



</div>



`;



}else{



box.innerHTML = `


<div class="about-box">


<h2>
لم يتم اختيار منتج
</h2>


<p>
الرجاء العودة إلى المنتجات واختيار منتج.
</p>


</div>


`;



}





function addCartQty(){



let qty =
parseInt(
document.getElementById("qty").value
)
||1;



let size =
document.getElementById("size").value;



for(let i=0;i<qty;i++){


addToCart(
product.name + " - " + size,
product.price,
product.image
);


}



alert("✅ تمت إضافة المنتج إلى السلة");


}




</script>




</body>

</html>
