<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>إدارة الطلبات | مجمع حمزه الشطري</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f3f6fb;
padding:15px;
color:#222;
}

.container{
max-width:1500px;
margin:auto;
}

h1{
background:linear-gradient(135deg,#111827,#1f2937);
color:#fff;
padding:20px;
border-radius:18px;
text-align:center;
margin-bottom:20px;
font-size:30px;
font-weight:800;
box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-bottom:20px;
}

.card{
background:#fff;
border-radius:16px;
padding:18px;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,.08);
transition:.3s;
}

.card:hover{
transform:translateY(-4px);
}

.card h2{
font-size:15px;
color:#777;
margin-bottom:10px;
}

.card span{
font-size:30px;
font-weight:800;
color:#111827;
}

.search-box{
margin-bottom:20px;
}

.search-box input{
width:100%;
padding:15px;
border:1px solid #ddd;
border-radius:12px;
font-size:16px;
outline:none;
transition:.3s;
}

.search-box input:focus{
border-color:#c79b3b;
box-shadow:0 0 0 3px rgba(199,155,59,.15);
}

  table{
width:100%;
background:#fff;
border-collapse:collapse;
border-radius:18px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,.08);
}

thead{
background:#c79b3b;
color:#fff;
}

th{
padding:16px;
font-size:15px;
font-weight:800;
white-space:nowrap;
}

td{
padding:14px;
text-align:center;
border-bottom:1px solid #eee;
vertical-align:middle;
font-size:15px;
}

tbody tr{
transition:.25s;
}

tbody tr:hover{
background:#faf7ef;
}

.product-img{
width:70px;
height:70px;
object-fit:cover;
border-radius:12px;
border:1px solid #ddd;
}

select{
padding:10px;
border-radius:10px;
border:1px solid #ddd;
background:#fff;
font-size:14px;
}

button{
padding:10px 16px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:700;
font-size:14px;
transition:.25s;
color:#fff;
}

button:hover{
transform:translateY(-2px);
}

.whatsapp{
background:#25D366;
}

.review{
background:#1976d2;
}

.delete{
background:#e53935;
}

  /*=========================
Responsive Mobile
=========================*/

@media (max-width:900px){

.container{
padding:0;
}

.stats{
grid-template-columns:1fr;
}

.card span{
font-size:26px;
}

.search-box input{
font-size:15px;
}

table{
display:block;
overflow-x:auto;
white-space:nowrap;
border-radius:15px;
}

thead th{
font-size:14px;
padding:14px;
}

tbody td{
font-size:14px;
padding:12px;
}

.product-img{
width:60px;
height:60px;
}

button{
padding:10px 14px;
font-size:13px;
}

}

@media (max-width:600px){

body{
padding:10px;
}

h1{
font-size:24px;
padding:16px;
}

.card{
padding:15px;
}

.card h2{
font-size:14px;
}

.card span{
font-size:24px;
}

.product-img{
width:55px;
height:55px;
}

th,
td{
padding:10px;
font-size:13px;
}

button{
width:100%;
margin:3px 0;
}

select{
width:100%;
}

}

</style>

  <body>

<div class="container">

<h1>🛒 إدارة طلبات الزبائن</h1>

<div class="stats">

<div class="card">
<h2>الطلبات الجديدة</h2>
<span id="newOrders">0</span>
</div>

<div class="card">
<h2>إجمالي الطلبات</h2>
<span id="totalOrders">0</span>
</div>

<div class="card">
<h2>إجمالي المبيعات</h2>
<span id="totalSales">0</span>
</div>

</div>

<div class="search-box">

<input
id="searchInput"
type="text"
placeholder="🔍 ابحث باسم الزبون أو رقم الهاتف">

</div>

  <table>

<thead>

<tr>

<th>#</th>

<th>الزبون</th>

<th>الهاتف</th>

<th>المنتجات</th>

<th>الصور</th>

<th>المجموع</th>

<th>التاريخ</th>

<th>الحالة</th>

<th>واتساب</th>

<th>الإجراءات</th>

</tr>

</thead>

<tbody id="ordersTable">

<tr>

<td colspan="10" style="
padding:30px;
text-align:center;
color:#777;
font-weight:bold;
">

جاري تحميل الطلبات...

</td>

</tr>

</tbody>

</table>

</div>

<button onclick="document.getElementById('notifySound').play()">
🔊 اختبار الصوت
</button>
    
<audio id="notifySound">

<source
src="notification.mp3"
type="audio/mpeg">

</audio>

    <script type="module" src="./admin-guard.js"></script>

<script type="module" src="./admin-orders.js?v=19"></script>

</body>

</html>
