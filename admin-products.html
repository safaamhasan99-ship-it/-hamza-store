<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إدارة المنتجات | مجمع حمزه الشطري</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f5f7fb;
}

header{
background:#111827;
color:#fff;
padding:20px;
text-align:center;
}

header h1{
font-size:30px;
margin-bottom:8px;
}

header p{
color:#ddd;
}

.container{
max-width:900px;
margin:25px auto;
padding:20px;
}

.title{
text-align:center;
font-size:28px;
margin-bottom:20px;
font-weight:800;
}

.form-box{
background:#fff;
padding:25px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.form-box input,
.form-box textarea,
.form-box select{
width:100%;
padding:14px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:10px;
font-size:15px;
}

.form-box textarea{
resize:vertical;
min-height:120px;
}

#saveBtn{
width:100%;
padding:15px;
background:#c79b3b;
color:#fff;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

#saveBtn:hover{
background:#ae832b;
}

.products-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
gap:20px;
margin-top:30px;
}

.admin-product-card{
background:#fff;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,.08);
padding:15px;
text-align:center;
}

.admin-product-card img{
width:100%;
height:230px;
object-fit:cover;
border-radius:10px;
margin-bottom:10px;
}

.admin-actions{
display:flex;
gap:10px;
margin-top:15px;
}

.edit-btn{
flex:1;
background:#1976d2;
color:#fff;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
}

.delete-btn{
flex:1;
background:#d32f2f;
color:#fff;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
}

.empty{
text-align:center;
padding:30px;
color:#777;
}

</style>

</head>

<body>

<header>

<h1>مجمع حمزه الشطري</h1>

<p>لوحة إدارة المنتجات</p>

</header>

<div class="container">

<h2 class="title">
➕ إضافة منتج جديد
</h2>

<form id="productForm" class="form-box">

  <input
id="name"
type="text"
placeholder="اسم المنتج"
required>

<input
id="price"
type="number"
placeholder="السعر"
required>

<textarea
id="description"
placeholder="وصف المنتج">
</textarea>

<select id="category" required>

<option value="">اختر القسم</option>

<option value="men">👔 القسم الرجالي</option>

<option value="women">👗 القسم النسائي</option>

<option value="boys">🧒 القسم الولادي</option>

<option value="girls">👧 القسم البناتي</option>

<option value="pants">👖 البنطرونات</option>

<option value="underwear">🩳 الداخليات</option>

<option value="socks">🧦 الجوارب</option>

<option value="hijabs">🧕 قسم الحجابات والشالات</option>

</select>

<input
id="sizes"
type="text"
placeholder="القياسات">

<input
id="colors"
type="text"
placeholder="الألوان">

<input
id="quantity"
type="number"
placeholder="الكمية"
value="1">

<label style="font-weight:bold;display:block;margin-bottom:8px;">
📷 رابط صورة المنتج
</label>

<input
id="image"
type="file"
accept="image/*">

<label style="display:flex;align-items:center;gap:10px;margin:15px 0;">

<input
id="offer"
type="checkbox">

<span>عرض خاص</span>

</label>

<button
id="saveBtn"
type="submit">

💾 حفظ المنتج

</button>

</form>

<hr style="margin:35px 0;">

<h2 class="title">

📦 المنتجات المضافة

</h2>

<input
id="search"
type="text"
placeholder="🔍 البحث عن منتج">

<div
id="productsContainer"
class="products-grid">

<p class="empty">

جاري تحميل المنتجات...

</p>

</div>

  <div style="text-align:center;margin:25px 0;">

<button
type="button"
onclick="loadProducts()"
style="
padding:12px 22px;
background:#1976d2;
color:#fff;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
">

🔄 تحديث المنتجات

</button>

</div>

</div>

<footer style="
margin-top:50px;
padding:25px;
text-align:center;
color:#777;
font-size:15px;
">

مجمع حمزه الشطري © 2026

</footer>

<script type="module" src="./admin-products.js?v=18"></script>

</body>

</html>
