<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>إدارة المنتجات | مجمع حمزه الشطري</title>


<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">


<link rel="stylesheet" href="style.css">



<style>

.form-box{

max-width:700px;

margin:20px auto;

background:#fff;

padding:25px;

border-radius:18px;

box-shadow:0 10px 25px rgba(0,0,0,.08);

}



.form-box input,

.form-box textarea,

.form-box select{

width:100%;

padding:14px;

margin-bottom:15px;

border:1px solid #ddd;

border-radius:10px;

font-family:'Cairo',sans-serif;

font-size:15px;

}



.form-box button{

width:100%;

padding:15px;

background:#c79b3b;

color:#fff;

border:none;

border-radius:10px;

font-size:18px;

font-weight:bold;

cursor:pointer;

}



.product-box{

background:white;

padding:15px;

border-radius:15px;

margin:15px;

box-shadow:0 5px 15px #ddd;

}



.product-box button{

margin:5px;

padding:8px 15px;

border:none;

border-radius:8px;

cursor:pointer;

}



</style>


</head>


<body>


<header class="header">


<div class="top-header">


<div class="brand">


<h1>مجمع حمزه الشطري</h1>


<p>لوحة إدارة المنتجات</p>


</div>


</div>


</header>
<section class="products">


<h2 class="title">
➕ إضافة منتج جديد
</h2>



<div class="form-box">



<input
id="name"
type="text"
placeholder="اسم المنتج">



<input
id="price"
type="number"
placeholder="السعر">



<textarea
id="description"
rows="4"
placeholder="وصف المنتج">
</textarea>



<select id="category">


<option value="men">
👔 القسم الرجالي
</option>


<option value="women">
👗 القسم النسائي
</option>


<option value="boys">
🧒 القسم الولادي
</option>


<option value="girls">
👧 القسم البناتي
</option>


<option value="pants">
👖 البنطرونات
</option>


<option value="underwear">
🩳 الداخليات
</option>


<option value="socks">
🧦 الجوراب
</option>


<option value="hijabs">
🧕 قسم الحجابات والشالات
</option>
  
</select>



<input
id="sizes"
type="text"
placeholder="القياسات">



<input
id="colors"
type="text"
placeholder="الألوان">



<input
id="quantity"
type="number"
placeholder="الكمية">



<label for="image" style="display:block;font-weight:bold;margin-bottom:8px;">
📷 اختر صورة المنتج
</label>

<input
    id="image"
    type="file"
    accept="image/*"
    style="
        width:100%;
        padding:14px;
        margin-bottom:15px;
        border:1px solid #ddd;
        border-radius:10px;
        font-family:'Cairo',sans-serif;
        background:#fff;
        cursor:pointer;
    ">



<label>

<input
id="offer"
type="checkbox">

عرض خاص

</label>



<br><br>



<button
id="saveBtn"
type="button">

💾 حفظ المنتج

</button>



</div>
<h2 class="title">

📦 المنتجات المضافة

</h2>



<div style="text-align:center;margin-bottom:20px;">


<button
onclick="refreshProducts()"
class="cart-btn">

🔄 تحديث المنتجات

</button>


</div>



<div
id="productsList"
class="products-grid">


</div>



</section>




<footer style="text-align:center;padding:25px;color:#777;">


مجمع حمزه الشطري © 2026




<select id="category">

<option value="men">👔 القسم الرجالي</option>

<option value="women">👗 القسم النسائي</option>

<option value="boys">🧒 القسم الولادي</option>

<option value="girls">👧 القسم البناتي</option>

<option value="pants">👖 البنطرونات</option>

<option value="underwear">🩳 الداخليات</option>

<option value="socks">🧦 الجوارب</option>

<option value="hijabs">🧕 قسم الحجابات والشالات</option>

</select>

<input
id="sizes"
type="text"
placeholder="القياسات">

<input
id="colors"
type="text"
placeholder="الألوان">

<input
id="quantity"
type="number"
placeholder="الكمية">

<label style="font-weight:bold;display:block;margin-bottom:8px;">
📷 اختر صورة المنتج
</label>

<input
id="image"
type="file"
accept="image/*">

<label style="display:flex;align-items:center;gap:10px;margin:15px 0;">

<input
id="offer"
type="checkbox">

<span>عرض خاص</span>

</label>

<button
id="saveBtn"
type="button">

💾 حفظ المنتج

</button>

</div>

<h2 class="title">

📦 المنتجات المضافة

</h2>

<div style="text-align:center;margin-bottom:20px;">

<button
onclick="refreshProducts()"
class="cart-btn">

🔄 تحديث المنتجات

</button>

</div>

<div
id="productsList"
class="products-grid">

</div>

</section>

<footer style="
text-align:center;
padding:25px;
color:#777;
font-family:'Cairo',sans-serif;
">

مجمع حمزه الشطري © 2026

</footer>

<script type="module" src="./admin-products.js?v=17"></script>

</body>

</html>
