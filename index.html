<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>مجمع حمزه الشطري</title>

<meta name="theme-color" content="#111827">

<link rel="icon" href="images/logo.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

  <!-- Hero Slider -->

<section class="hero-slider">

<div class="hero-slide active">

<img src="images/banner1.jpg" alt="">

<div class="hero-overlay">

<span class="hero-badge">
🔥 عروض الأسبوع
</span>

<h2>
أحدث موديلات الملابس التركية
</h2>

<p>
أفضل جودة وأسعار الجملة لجميع محافظات العراق
</p>

<a href="products.html" class="hero-btn">

تسوق الآن

<i class="fa-solid fa-arrow-left"></i>

</a>

</div>

</div>

<div class="hero-slide">

<img src="images/banner2.jpg" alt="">

<div class="hero-overlay">

<span class="hero-badge">

⭐ موديلات جديدة

</span>

<h2>

وصلت تشكيلات الموسم

</h2>

<p>

تخفيضات خاصة على كميات الجملة

</p>

<a href="products.html" class="hero-btn">

عرض المنتجات

</a>

</div>

</div>

<div class="hero-dots">

<span class="hero-dot active"></span>

<span class="hero-dot"></span>

</div>

</section>
<!-- Product Card Template -->

<template id="productTemplate">

<div class="product-card">

<div class="product-image">

<img src="" class="product-img" loading="lazy">

<div class="product-badges">

<span class="badge new">جديد</span>

<span class="badge stock">متوفر</span>

</div>

<button class="favorite-btn">

<i class="fa-regular fa-heart"></i>

</button>

</div>

<div class="product-content">

<h3 class="product-name"></h3>

<div class="rating">

<i class="fa-solid fa-star"></i>
<i class="fa-solid fa-star"></i>
<i class="fa-solid fa-star"></i>
<i class="fa-solid fa-star"></i>
<i class="fa-solid fa-star-half-stroke"></i>

<span>(4.8)</span>

</div>

<div class="price-box">

<span class="price"></span>

<span class="old-price"></span>

</div>

<div class="product-buttons">

<button class="details-btn">

<i class="fa-solid fa-eye"></i>

عرض

</button>

<button class="cart-btn">

<i class="fa-solid fa-cart-shopping"></i>

إضافة للسلة

</button>

</div>

</div>

</div>

</template>
