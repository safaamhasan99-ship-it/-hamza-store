<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>القسم الرجالي | مجمع حمزه الشطري</title>

<link rel="icon" href="5FBF3B90-553B-424D-A9B1-1BE2F7F9362B.png">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="loader">

<div class="loader-box">

<img src="5FBF3B90-553B-424D-A9B1-1BE2F7F9362B.png">

<h2>مجمع حمزه الشطري</h2>

<div class="loader-spinner"></div>

<p>جاري تحميل القسم...</p>

</div>

</div>

<header class="header">

<div class="logo-box">

<img src="5FBF3B90-553B-424D-A9B1-1BE2F7F9362B.png">

<div>

<h1>مجمع حمزه الشطري</h1>

<span>القسم الرجالي</span>

</div>

</div>

<div class="header-buttons">

<a href="cart.html" class="cart-btn">

<i class="fa-solid fa-cart-shopping"></i>

<span id="cartCount">0</span>

</a>

<button id="darkBtn" class="dark-btn">

<i class="fa-solid fa-moon"></i>

</button>

</div>

</header>

<section class="search-box">

<input
id="searchInput"
type="text"
placeholder="ابحث داخل القسم الرجالي...">

<i class="fa-solid fa-magnifying-glass"></i>

</section>

<section class="products-home">

<h2 class="title">
👔 القسم الرجالي
</h2>

<div id="productsGrid" class="products-grid">

<div class="loading-products">

جاري تحميل المنتجات...

</div>

</div>

</section>

<script type="module">

import { db } from "./firebase.js";

import {
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const grid=document.getElementById("productsGrid");
const loader=document.getElementById("loader");

async function loadProducts(){

grid.innerHTML=`
<div class="loading-products">
جاري تحميل المنتجات...
</div>
`;

try{

const snap=await getDocs(collection(db,"products"));

grid.innerHTML="";

let found=false;

snap.forEach(doc=>{

const p={
id:doc.id,
...doc.data()
};

const cat=(p.category||"").trim().toLowerCase();

if(
cat!=="men" &&
cat!=="رجالي" &&
cat!=="القسم الرجالي"
){
return;
}

found=true;

grid.innerHTML+=`

<div class="product-card">

<img
src="${p.image || '5FBF3B90-553B-424D-A9B1-1BE2F7F9362B.png'}"
alt="${p.name}">

<div class="product-info">

<h3>${p.name || ""}</h3>

<p class="price">

${Number(p.price || 0).toLocaleString()} د.ع

</p>

<div class="product-actions">

<a
href="details.html?id=${p.id}"
class="details-btn">

التفاصيل

</a>

<button
class="cart-add"
data-id="${p.id}"
data-name="${p.name}"
data-price="${p.price}"
data-image="${p.image}">

<i class="fa-solid fa-cart-shopping"></i>

السلة

</button>

</div>

</div>

</div>

`;

});

if(!found){

grid.innerHTML=`

<div class="loading-products">

لا توجد منتجات في القسم الرجالي

</div>

`;

}

loader.style.display="none";

bindCartButtons();

}catch(e){

loader.style.display="none";

console.error(e);

grid.innerHTML=`

<div class="loading-products">

حدث خطأ أثناء تحميل المنتجات

</div>

`;

}

}

function bindCartButtons(){

document.querySelectorAll(".cart-add").forEach(btn=>{

btn.onclick=()=>{

let cart=JSON.parse(localStorage.getItem("cart")||"[]");

const id=btn.dataset.id;

const item=cart.find(x=>x.id===id);

if(item){

item.qty++;

}else{

cart.push({

id:id,

name:btn.dataset.name,

price:Number(btn.dataset.price),

image:btn.dataset.image,

qty:1

});

}

localStorage.setItem("cart",JSON.stringify(cart));

updateCartCount();

alert("تمت إضافة المنتج إلى السلة");

};

});

}

function updateCartCount(){

const cart=JSON.parse(localStorage.getItem("cart")||"[]");

const count=cart.reduce((sum,item)=>sum+(item.qty||1),0);

document.getElementById("cartCount").textContent=count;

}

loadProducts();

updateCartCount();

const searchInput=document.getElementById("searchInput");

searchInput.addEventListener("input",()=>{

const keyword=searchInput.value.trim().toLowerCase();

document.querySelectorAll(".product-card").forEach(card=>{

const text=card.innerText.toLowerCase();

card.style.display=text.includes(keyword) ? "" : "none";

});

});
  window.addEventListener("load",()=>{

if(loader){

loader.style.display="none";

}

});

/*========================
الوضع الليلي
========================*/

const darkBtn=document.getElementById("darkBtn");

if(localStorage.getItem("darkMode")==="true"){

document.body.classList.add("dark");

}

darkBtn.addEventListener("click",()=>{

document.body.classList.toggle("dark");

localStorage.setItem(
"darkMode",
document.body.classList.contains("dark")
);

});

/*========================
تحديث عدد السلة عند فتح الصفحة
========================*/

updateCartCount();

</script>

</body>

</html>
