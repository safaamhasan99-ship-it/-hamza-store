<script type="module">

import { db } from "./js/firebase.js";

import {
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const grid = document.getElementById("productsGrid");

const searchInput = document.getElementById("searchInput");

let allProducts = [];

async function loadMenProducts() {

grid.innerHTML = `
<div class="loading-products">
جاري تحميل المنتجات...
</div>
`;

try{

const snap = await getDocs(collection(db,"products"));

allProducts = [];
    function renderProducts(list){

if(!list.length){

grid.innerHTML=`

<div class="loading-products">

لا توجد منتجات في القسم الرجالي

</div>

`;

return;

}

grid.innerHTML="";

list.forEach(product=>{

const image=

product.image||
product.img||
product.imageUrl||
"images/no-image.png";

const price=
Number(product.price||0).toLocaleString();

grid.innerHTML+=`

<div class="product-card">

<div class="product-image">

<img
src="${image}"
alt="${product.name}"
loading="lazy"
onerror="this.src='images/no-image.png'">

</div>

<div class="product-info">

<h3 class="product-title">

${product.name}

</h3>

<div class="product-price">

${price} د.ع

</div>

<div class="product-actions">

<button
class="add-cart"
data-id="${product.id}">

<i class="fa-solid fa-cart-shopping"></i>

إضافة للسلة

</button>

<a
href="details.html?id=${product.id}"
class="details-btn">

عرض التفاصيل

</a>

</div>

</div>

</div>

`;

});

}

    <script type="module">

function updateCartCount(){

const cart=JSON.parse(localStorage.getItem("cart"))||[];

const total=cart.reduce((sum,item)=>sum+(item.qty||1),0);

document.getElementById("cartCount").textContent=total;

}

function addToCart(product){

let cart=JSON.parse(localStorage.getItem("cart"))||[];

const index=cart.findIndex(item=>item.id===product.id);

if(index>-1){

cart[index].qty+=1;

}else{

cart.push({

id:product.id,

name:product.name,

price:Number(product.price||0),

image:
product.image||
product.img||
product.imageUrl||
"images/no-image.png",

qty:1

});

}

localStorage.setItem("cart",JSON.stringify(cart));

updateCartCount();

alert("تمت إضافة المنتج إلى السلة");

}

document.addEventListener("click",(e)=>{

const btn=e.target.closest(".add-cart");

if(!btn)return;

const id=btn.dataset.id;

const product=allProducts.find(p=>p.id===id);

if(product){

addToCart(product);

}

});

updateCartCount();

    /*==================================
البحث + الوضع الليلي + تشغيل الصفحة
==================================*/

searchInput.addEventListener("input",()=>{

const keyword=searchInput.value.trim().toLowerCase();

if(!keyword){

renderProducts(allProducts);

return;

}

const filtered=allProducts.filter(product=>{

const name=(product.name||"").toLowerCase();

const description=(product.description||"").toLowerCase();

const colors=(product.colors||"").toLowerCase();

return(

name.includes(keyword)||

description.includes(keyword)||

colors.includes(keyword)

);

});

renderProducts(filtered);

});

const darkBtn=document.getElementById("darkBtn");

if(localStorage.getItem("theme")==="dark"){

document.body.classList.add("dark-mode");

darkBtn.innerHTML='<i class="fa-solid fa-sun"></i>';

}

darkBtn.addEventListener("click",()=>{

document.body.classList.toggle("dark-mode");

const dark=document.body.classList.contains("dark-mode");

localStorage.setItem("theme",dark?"dark":"light");

darkBtn.innerHTML=dark
?'<i class="fa-solid fa-sun"></i>'
:'<i class="fa-solid fa-moon"></i>';

});

loadMenProducts();

</script>

    <script type="module">

/*==================================
تحسين الصور
==================================*/

document.addEventListener("error",(e)=>{

if(

e.target.tagName==="IMG" &&

!e.target.dataset.failed

){

e.target.dataset.failed="1";

e.target.src="images/no-image.png";

}

},true);


/*==================================
تحديث عداد السلة
==================================*/

window.addEventListener("storage",()=>{

updateCartCount();

});

window.addEventListener("focus",()=>{

updateCartCount();

});


/*==================================
زر الرجوع للأعلى
==================================*/

const topBtn=document.createElement("button");

topBtn.className="scroll-top";

topBtn.innerHTML=`
<i class="fa-solid fa-arrow-up"></i>
`;

document.body.appendChild(topBtn);

window.addEventListener("scroll",()=>{

if(window.scrollY>300){

topBtn.classList.add("show");

}else{

topBtn.classList.remove("show");

}

});

topBtn.addEventListener("click",()=>{

window.scrollTo({

top:0,

behavior:"smooth"

});

});

</script>

    <script type="module">

/*==================================
تحسين تحميل الصفحة
==================================*/

window.addEventListener("load",()=>{

const loader=document.getElementById("loader");

if(loader){

loader.classList.add("hide");

setTimeout(()=>{

loader.remove();

},400);

}

});


/*==================================
حفظ آخر بحث
==================================*/

if(searchInput){

const lastSearch=localStorage.getItem("menSearch");

if(lastSearch){

searchInput.value=lastSearch;

searchInput.dispatchEvent(new Event("input"));

}

searchInput.addEventListener("input",()=>{

localStorage.setItem(

"menSearch",

searchInput.value

);

});

}


/*==================================
منع سحب الصور
==================================*/

document.addEventListener("dragstart",(e)=>{

if(e.target.tagName==="IMG"){

e.preventDefault();

}

});


/*==================================
تحسين تحميل الصور
==================================*/

document.querySelectorAll("img").forEach(img=>{

img.loading="lazy";

img.decoding="async";

});

</script>

    <script type="module">

/*==================================
تحسينات عامة
==================================*/

function refreshImages(){

document.querySelectorAll(".product-card img").forEach(img=>{

img.loading="lazy";

img.decoding="async";

img.onerror=function(){

this.src="images/no-image.png";

};

});

}

/*==================================
تحديث البطاقات بعد الرسم
==================================*/

const oldRender = renderProducts;

renderProducts = function(list){

oldRender(list);

refreshImages();

};

/*==================================
إعادة تحميل العداد عند العودة للصفحة
==================================*/

window.addEventListener("pageshow",()=>{

updateCartCount();

});

/*==================================
إخفاء شاشة التحميل إذا بقيت ظاهرة
==================================*/

setTimeout(()=>{

const loader=document.getElementById("loader");

if(loader){

loader.style.opacity="0";

loader.style.pointerEvents="none";

setTimeout(()=>{

loader.remove();

},300);

}

},3000);

</script>

    <script type="module">

/*==================================
تشغيل الصفحة
==================================*/

document.addEventListener("DOMContentLoaded", async () => {

    updateCartCount();

    await loadMenProducts();

    if (typeof refreshImages === "function") {
        refreshImages();
    }

});


/*==================================
تحديث الصور بعد تحميل المنتجات
==================================*/

window.addEventListener("load", () => {

    document.querySelectorAll(".product-card img").forEach(img => {

        img.loading = "lazy";

        img.decoding = "async";

        img.onerror = () => {

            img.src = "images/no-image.png";

        };

    });

});


/*==================================
إخفاء شاشة التحميل نهائياً
==================================*/

window.addEventListener("load", () => {

    const loader = document.getElementById("loader");

    if (loader) {

        loader.style.opacity = "0";

        setTimeout(() => {

            loader.remove();

        }, 300);

    }

});

</script>
