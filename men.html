<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>القسم الرجالي | مجمع حمزه الشطري</title>

    <meta name="description" content="القسم الرجالي - مجمع حمزه الشطري">

    <link rel="icon" href="images/logo.png">

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <script type="module" src="js/firebase.js"></script>
</head>

<body data-category="قسم رجالي">

    <!-- Header -->
    <header class="header">

        <a href="index.html" class="logo">
            <img src="images/logo.png" alt="مجمع حمزه الشطري">
        </a>

        <h1 class="page-title">
            القسم الرجالي
        </h1>

        <div class="header-icons">

            <a href="favorites.html" class="icon-btn">
                <i class="fa-solid fa-heart"></i>
            </a>

            <a href="cart.html" class="icon-btn cart-icon">

                <i class="fa-solid fa-cart-shopping"></i>

                <span id="cartCount">
                    0
                </span>

            </a>

            <button id="darkModeBtn" class="icon-btn">

                <i class="fa-solid fa-moon"></i>

            </button>

        </div>

    </header>

    <!-- Search -->

    <section class="search-section">

        <input
            type="text"
            id="searchInput"
            placeholder="ابحث عن منتج..."
            autocomplete="off">

    </section>

    <!-- Products -->

    <main class="products-page">

        <div
            id="productsGrid"
            class="products-grid">

            <div class="loading">

                جاري تحميل المنتجات...

            </div>

        </div>

    </main>

      <script type="module">

        import {
            db
        } from "./js/firebase.js";

        import {
            collection,
            getDocs
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const grid = document.getElementById("productsGrid");
        const searchInput = document.getElementById("searchInput");

        let products = [];

        async function loadProducts() {

            grid.innerHTML =
                `<div class="loading">جاري تحميل المنتجات...</div>`;

            try {

                const snapshot = await getDocs(
                    collection(db, "products")
                );

                products = [];

                snapshot.forEach(doc => {

                    const data = doc.data();

                    const category =
                        (data.category || "").trim();

                    if (
                        category === "قسم رجالي" ||
                        category === "رجالي"
                    ) {

                        products.push({
                            id: doc.id,
                            ...data
                        });

                    }

                });

                renderProducts(products);

            } catch (err) {

                console.error(err);

                grid.innerHTML = `
                    <div class="empty-products">
                        حدث خطأ أثناء تحميل المنتجات
                    </div>
                `;

            }

        }

        function renderProducts(list) {

            if (!list.length) {

                grid.innerHTML = `
                    <div class="empty-products">
                        لا توجد منتجات في هذا القسم
                    </div>
                `;

                return;
            }

            grid.innerHTML = "";

            list.forEach(product => {

                createCard(product);

            });

        }
    </script>

  <script type="module">

function createCard(product) {

    const card = document.createElement("div");
    card.className = "product-card";

    const image =
        product.image ||
        product.img ||
        "images/no-image.png";

    const price =
        Number(product.price || 0).toLocaleString();

    card.innerHTML = `

        <div class="product-image">

            <img
                src="${image}"
                alt="${product.name}"
                loading="lazy"
                onerror="this.src='images/no-image.png'">

        </div>

        <div class="product-content">

            <h3 class="product-name">
                ${product.name}
            </h3>

            <p class="product-price">
                ${price} د.ع
            </p>

            <div class="product-buttons">

                <button
                    class="details-btn"
                    data-id="${product.id}">

                    <i class="fa-solid fa-eye"></i>

                    التفاصيل

                </button>

                <button
                    class="cart-btn"
                    data-id="${product.id}">

                    <i class="fa-solid fa-cart-shopping"></i>

                    إضافة للسلة

                </button>

            </div>

        </div>

    `;

    grid.appendChild(card);

}

</script>

  <script type="module">

function addToCart(product) {

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    const index = cart.findIndex(item => item.id === product.id);

    if (index > -1) {

        cart[index].qty += 1;

    } else {

        cart.push({
            id: product.id,
            name: product.name,
            price: Number(product.price || 0),
            image: product.image || product.img || "images/no-image.png",
            qty: 1
        });

    }

    localStorage.setItem("cart", JSON.stringify(cart));

    updateCartCount();

    alert("تمت إضافة المنتج إلى السلة");

}

function updateCartCount() {

    const cart = JSON.parse(localStorage.getItem("cart")) || [];

    const count = cart.reduce((sum, item) => sum + item.qty, 0);

    const badge = document.getElementById("cartCount");

    if (badge) {

        badge.textContent = count;

    }

}

document.addEventListener("click", (e) => {

    if (e.target.closest(".cart-btn")) {

        const id = e.target.closest(".cart-btn").dataset.id;

        const product = products.find(p => p.id === id);

        if (product) {

            addToCart(product);

        }

    }

    if (e.target.closest(".details-btn")) {

        const id = e.target.closest(".details-btn").dataset.id;

        window.location.href = `details.html?id=${id}`;

    }

});

updateCartCount();

</script>

  <script type="module">

/*=========================
    البحث
=========================*/

searchInput.addEventListener("input", () => {

    const keyword = searchInput.value
        .trim()
        .toLowerCase();

    const filtered = products.filter(product => {

        const name = (product.name || "").toLowerCase();
        const description = (product.description || "").toLowerCase();

        return (
            name.includes(keyword) ||
            description.includes(keyword)
        );

    });

    renderProducts(filtered);

});


/*=========================
    الوضع الليلي
=========================*/

const darkBtn = document.getElementById("darkModeBtn");

if (localStorage.getItem("theme") === "dark") {

    document.body.classList.add("dark-mode");

    darkBtn.innerHTML =
        '<i class="fa-solid fa-sun"></i>';

}

darkBtn.addEventListener("click", () => {

    document.body.classList.toggle("dark-mode");

    const dark =
        document.body.classList.contains("dark-mode");

    localStorage.setItem(
        "theme",
        dark ? "dark" : "light"
    );

    darkBtn.innerHTML = dark
        ? '<i class="fa-solid fa-sun"></i>'
        : '<i class="fa-solid fa-moon"></i>';

});


/*=========================
    تشغيل الصفحة
=========================*/

loadProducts();

</script>
<script type="module">

/*=========================
    تحسين الصور
=========================*/

document.addEventListener("error", (e) => {

    if (
        e.target.tagName === "IMG" &&
        !e.target.dataset.failed
    ) {

        e.target.dataset.failed = "1";
        e.target.src = "images/no-image.png";

    }

}, true);


/*=========================
    ترتيب المنتجات
=========================*/

products.sort((a, b) => {

    const aName = (a.name || "").toLowerCase();
    const bName = (b.name || "").toLowerCase();

    return aName.localeCompare(bName, "ar");

});


/*=========================
    إعادة تحميل العداد
=========================*/

window.addEventListener("storage", () => {

    updateCartCount();

});


/*=========================
    زر الرجوع للأعلى
=========================*/

const topBtn = document.createElement("button");

topBtn.className = "scroll-top";

topBtn.innerHTML =
    '<i class="fa-solid fa-arrow-up"></i>';

document.body.appendChild(topBtn);

window.addEventListener("scroll", () => {

    topBtn.classList.toggle(
        "show",
        window.scrollY > 300
    );

});

topBtn.addEventListener("click", () => {

    window.scrollTo({
        top: 0,
        behavior: "smooth"
    });

});

</script>
<script type="module">

/*==================================
    تحسين عرض المنتجات
==================================*/

function formatPrice(price) {

    const value = Number(price || 0);

    return value.toLocaleString("en-US") + " د.ع";

}

function getImage(product) {

    return (
        product.image ||
        product.img ||
        product.imageUrl ||
        "images/no-image.png"
    );

}

function getQuantity(product) {

    return Number(product.quantity || 0);

}

function getSizes(product) {

    return product.sizes || "";

}


/*==================================
    تحديث البطاقات بعد التحميل
==================================*/

function refreshCards() {

    document.querySelectorAll(".product-card").forEach(card => {

        const img = card.querySelector("img");

        if (img) {

            img.loading = "lazy";
            img.decoding = "async";

        }

    });

}


/*==================================
    رسالة عند عدم وجود منتجات
==================================*/

function showEmptyMessage() {

    grid.innerHTML = `

        <div class="empty-products">

            <i class="fa-solid fa-box-open"></i>

            <h3>لا توجد منتجات حالياً</h3>

            <p>سيتم إضافة منتجات جديدة قريباً.</p>

        </div>

    `;

}

</script>
<script type="module">

/*==================================
    تحسين البحث
==================================*/

function filterProducts(keyword) {

    keyword = keyword.trim().toLowerCase();

    if (!keyword) {
        renderProducts(products);
        refreshCards();
        return;
    }

    const result = products.filter(product => {

        const name = (product.name || "").toLowerCase();
        const desc = (product.description || "").toLowerCase();
        const colors = (product.colors || "").toLowerCase();

        return (
            name.includes(keyword) ||
            desc.includes(keyword) ||
            colors.includes(keyword)
        );

    });

    if (result.length === 0) {
        showEmptyMessage();
        return;
    }

    renderProducts(result);
    refreshCards();

}


/*==================================
    البحث المباشر
==================================*/

if (searchInput) {

    searchInput.addEventListener("keyup", (e) => {

        filterProducts(e.target.value);

    });

}


/*==================================
    تحديث الصفحة عند الرجوع
==================================*/

window.addEventListener("pageshow", () => {

    updateCartCount();

});


/*==================================
    منع سحب الصور
==================================*/

document.addEventListener("dragstart", (e) => {

    if (e.target.tagName === "IMG") {
        e.preventDefault();
    }

});

</script>
<script type="module">

/*==================================
    ترتيب المنتجات
==================================*/

const sortSelect = document.getElementById("sortProducts");

if (sortSelect) {

    sortSelect.addEventListener("change", () => {

        let list = [...products];

        switch (sortSelect.value) {

            case "priceLow":

                list.sort((a, b) =>
                    Number(a.price || 0) - Number(b.price || 0)
                );

                break;

            case "priceHigh":

                list.sort((a, b) =>
                    Number(b.price || 0) - Number(a.price || 0)
                );

                break;

            case "name":

                list.sort((a, b) =>
                    (a.name || "").localeCompare(b.name || "", "ar")
                );

                break;

            default:

                break;

        }

        renderProducts(list);
        refreshCards();

    });

}


/*==================================
    تحديث عداد السلة
==================================*/

window.addEventListener("focus", () => {

    updateCartCount();

});


/*==================================
    إخفاء رسالة التحميل
==================================*/

window.addEventListener("load", () => {

    const loading = document.querySelector(".loading");

    if (loading) {

        loading.remove();

    }

});

</script>
<script type="module">

/*==================================
    تشغيل الصفحة
==================================*/

document.addEventListener("DOMContentLoaded", async () => {

    updateCartCount();

    await loadProducts();

    refreshCards();

});


/*==================================
    تحديث الصور بعد التحميل
==================================*/

window.addEventListener("load", () => {

    document.querySelectorAll(".product-card img").forEach(img => {

        img.loading = "lazy";

        img.onerror = () => {

            img.src = "images/no-image.png";

        };

    });

});


/*==================================
    حفظ آخر بحث
==================================*/

if (searchInput) {

    searchInput.addEventListener("input", () => {

        localStorage.setItem(
            "menSearch",
            searchInput.value
        );

    });

    const lastSearch = localStorage.getItem("menSearch");

    if (lastSearch) {

        searchInput.value = lastSearch;

        filterProducts(lastSearch);

    }

}

</script>

</body>

</html>
