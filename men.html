<script type="module">

import { db } from "./js/firebase.js";

import {
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const grid = document.getElementById("productsGrid");
const searchInput = document.getElementById("searchInput");
const darkBtn = document.getElementById("darkBtn");
const cartCount = document.getElementById("cartCount");

let allProducts = [];

async function loadMenProducts(){

grid.innerHTML=`
<div class="loading-products">
جاري تحميل المنتجات...
</div>
`;

try{

const snap = await getDocs(collection(db,"products"));

allProducts=[];

snap.forEach(doc=>{

const p=doc.data();

const category=(p.category||"").trim().toLowerCase();

const validCategories=[

"men",
"رجالي",
"قسم رجالي",
"قسم الرجالي"

].map(c=>c.toLowerCase());

if(!validCategories.some(c=>category.includes(c))) return;

allProducts.push({

id:doc.id,
...p

});

});

renderProducts(allProducts);

}catch(err){

console.error(err);

grid.innerHTML=`
<div class="loading-products">
حدث خطأ أثناء تحميل المنتجات
</div>
`;

}

}
    function renderProducts(list){

if(!list.length){

grid.innerHTML=`
<div class="loading-products">
لا توجد منتجات في القسم الرجالي
</div>
`;

return;

}

grid.innerHTML="";

list.forEach(product=>{

const image=
product.image||
product.img||
product.imageUrl||
"images/no-image.png";

const price=Number(product.price||0).toLocaleString();

grid.innerHTML+=`

<div class="product-card">

<div class="product-image">

<img
src="${image}"
alt="${product.name}"
loading="lazy"
onerror="this.src='images/no-image.png'">

</div>

<div class="product-info">

<h3 class="product-title">
${product.name}
</h3>

<div class="product-price">
${price} د.ع
</div>

<div class="product-actions">

<button
class="add-cart"
data-id="${product.id}">

<i class="fa-solid fa-cart-shopping"></i>

إضافة للسلة

</button>

<a
href="details.html?id=${product.id}"
class="details-btn">

عرض التفاصيل

</a>

</div>

</div>

</div>

`;

});

}

    function updateCartCount(){

const cart=JSON.parse(localStorage.getItem("cart"))||[];

const total=cart.reduce((sum,item)=>sum+(item.qty||0),0);

if(cartCount){

cartCount.textContent=total;

}

}

function addToCart(product){

let cart=JSON.parse(localStorage.getItem("cart"))||[];

const index=cart.findIndex(item=>item.id===product.id);

if(index>-1){

cart[index].qty+=1;

}else{

cart.push({

id:product.id,

name:product.name,

price:Number(product.price||0),

image:product.image||product.img||product.imageUrl||"images/no-image.png",

qty:1

});

}

localStorage.setItem("cart",JSON.stringify(cart));

updateCartCount();

alert("تمت إضافة المنتج إلى السلة");

}

document.addEventListener("click",(e)=>{

const btn=e.target.closest(".add-cart");

if(!btn)return;

const id=btn.dataset.id;

const product=allProducts.find(p=>p.id===id);

if(product){

addToCart(product);

}

});

if (searchInput) {
  searchInput.addEventListener(...);
}

const keyword=searchInput.value.trim().toLowerCase();

if(!keyword){

renderProducts(allProducts);

return;

}

const filtered=allProducts.filter(product=>{

return(

(product.name||"").toLowerCase().includes(keyword)||

(product.description||"").toLowerCase().includes(keyword)||

(product.colors||"").toLowerCase().includes(keyword)

);

});

renderProducts(filtered);

});

    /*==================================
الوضع الليلي
==================================*/

if(localStorage.getItem("theme")==="dark"){

document.body.classList.add("dark-mode");

if(darkBtn){

darkBtn.innerHTML='<i class="fa-solid fa-sun"></i>';

}

}

darkBtn?.addEventListener("click",()=>{

document.body.classList.toggle("dark-mode");

const dark=document.body.classList.contains("dark-mode");

localStorage.setItem("theme",dark?"dark":"light");

darkBtn.innerHTML=dark
?'<i class="fa-solid fa-sun"></i>'
:'<i class="fa-solid fa-moon"></i>';

});


/*==================================
تحسين الصور
==================================*/

document.addEventListener("error",(e)=>{

if(e.target.tagName==="IMG"){

e.target.src="images/no-image.png";

}

},true);


/*==================================
تحديث العداد
==================================*/

window.addEventListener("focus",updateCartCount);

window.addEventListener("storage",updateCartCount);


/*==================================
تشغيل الصفحة
==================================*/

document.addEventListener("DOMContentLoaded",async()=>{

updateCartCount();

await loadMenProducts();

const loader=document.getElementById("loader");

if(loader){

setTimeout(()=>{

loader.style.opacity="0";

setTimeout(()=>loader.remove(),300);

},300);

}

});

    /*==================================
زر الرجوع للأعلى
==================================*/

const topBtn=document.createElement("button");

topBtn.className="scroll-top";

topBtn.innerHTML='<i class="fa-solid fa-arrow-up"></i>';

document.body.appendChild(topBtn);

window.addEventListener("scroll",()=>{

if(window.scrollY>300){

topBtn.classList.add("show");

}else{

topBtn.classList.remove("show");

}

});

topBtn.addEventListener("click",()=>{

window.scrollTo({

top:0,

behavior:"smooth"

});

});


/*==================================
حفظ آخر بحث
==================================*/

const lastSearch=localStorage.getItem("menSearch");

if(lastSearch){

searchInput.value=lastSearch;

const filtered=allProducts.filter(product=>{

const text=(
(product.name||"")+
(product.description||"")+
(product.colors||"")
).toLowerCase();

return text.includes(lastSearch.toLowerCase());

});

if(filtered.length){

renderProducts(filtered);

}

}

searchInput.addEventListener("input",()=>{

localStorage.setItem(

"menSearch",

searchInput.value

);

});


/*==================================
منع سحب الصور
==================================*/

document.addEventListener("dragstart",(e)=>{

if(e.target.tagName==="IMG"){

e.preventDefault();

}

});

    /*==================================
تحميل الصفحة
==================================*/

window.addEventListener("load",()=>{

document.querySelectorAll(".product-card img").forEach(img=>{

img.loading="lazy";

img.decoding="async";

img.onerror=function(){

this.src="images/no-image.png";

};

});

});


/*==================================
تشغيل الصفحة
==================================*/


</script>

<script type="module" src="script.js"></script>

</body>
</html>
