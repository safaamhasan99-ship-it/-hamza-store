<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>الداخليات الرجالي | مجمع حمزه الشطري</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<h1>مجمع حمزه الشطري</h1>

<p>قسم الداخليات الرجالي - بيع جملة فقط</p>

</header>



<section class="category-page">


<h2>الداخليات الرجالي</h2>


<div id="products" class="products">

</div>


</section>



<script type="module">


import { db } from "./firebase.js";


import {

collection,
getDocs

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";



const productsBox = document.getElementById("products");



async function loadProducts(){


try{


const snapshot = await getDocs(
collection(db,"products")
);



productsBox.innerHTML="";



snapshot.forEach((doc)=>{


let p = doc.data();



if(
p.category &&
p.category.includes("داخلي")
){



productsBox.innerHTML += `


<div class="product-card">


<img src="${p.image}" alt="${p.name}">


<h3>${p.name}</h3>


<p class="price">
${p.price} د.ع
</p>



<button onclick="order('${p.name}')">

طلب واتساب

</button>



</div>


`;



}



});



if(productsBox.innerHTML===""){


productsBox.innerHTML=

"<h3>لا توجد منتجات حالياً</h3>";

}


}

catch(error){


console.log(error);


productsBox.innerHTML=

"<h3>حدث خطأ في تحميل المنتجات</h3>";

}


}




window.order=function(name){


let phone="964xxxxxxxxxx";


let msg=
"السلام عليكم أريد طلب: "+name;



window.open(

"https://wa.me/"+phone+
"?text="+encodeURIComponent(msg)

);


}



loadProducts();



</script>



</body>

</html>
