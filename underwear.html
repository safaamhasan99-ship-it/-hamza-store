<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>الداخليات الرجالي | مجمع حمزه الشطري</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<h1>مجمع حمزه الشطري</h1>

<p>قسم الداخليات الرجالي - بيع جملة فقط</p>

</header>



<section class="category-page">


<h2>الداخليات الرجالي</h2>


<div id="products" class="products">

</div>


</section>



<script type="module">


import { db } from "./firebase.js";


import {

collection,
getDocs

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";



const productsBox = document.getElementById("products");



async function loadProducts(){


try{


const snapshot = await getDocs(
collection(db,"products")
);



productsBox.innerHTML = "";



snapshot.forEach((doc)=>{


let p = doc.data();



productsBox.innerHTML += `


<div class="product-card">


<img src="${p.image}" alt="${p.name}">


<h3>
${p.name}
</h3>


<p>
القسم: ${p.category || "غير موجود"}
</p>



<p class="price">

${p.price} د.ع

</p>



</div>


`;



});



if(productsBox.innerHTML===""){


productsBox.innerHTML="<h3>لا توجد منتجات</h3>";

}


}

catch(error){


console.log(error);


productsBox.innerHTML="<h3>حدث خطأ</h3>";

}


}



loadProducts();



</script>



</body>

</html>
