<!DOCTYPE html>

<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>إدارة المنتجات</title>


<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}


body{
background:#f5f7fb;
padding:30px;
}


.container{
max-width:1100px;
margin:auto;
}


h1{
margin-bottom:25px;
}


.form{

background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 20px #ddd;
margin-bottom:30px;

}


input,select,textarea{

width:100%;
padding:12px;
margin:8px 0;
border:1px solid #ddd;
border-radius:8px;
font-size:16px;

}


textarea{

height:100px;
resize:none;

}


button{

background:#c79b3b;
color:white;
border:0;
padding:12px 25px;
border-radius:8px;
cursor:pointer;

}


.products{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;

}


.card{

background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 15px #ddd;

}


.card img{

width:100%;
height:220px;
object-fit:cover;

}


.card-body{

padding:15px;

}


.price{

color:#c79b3b;
font-weight:bold;

}


.actions{

display:flex;
gap:10px;
margin-top:15px;

}


.edit{

background:#1976d2;

}


.delete{

background:#e53935;

}

</style>


</head>


<body>


<div class="container">


<h1>
إدارة منتجات مجمع حمزه الشطري
</h1>



<div class="form">


<input id="name" placeholder="اسم المنتج">


<input id="price" type="number" placeholder="السعر">


<input id="image" placeholder="رابط الصورة">


<select id="category">

<option value="رجالي">رجالي</option>

<option value="نسائي">نسائي</option>

<option value="ولادي">ولادي</option>

<option value="بناتي">بناتي</option>

<option value="جوارب">جوارب</option>

<option value="داخليات">داخليات</option>

</select>


<textarea id="description" placeholder="وصف المنتج"></textarea>



<button id="saveBtn">

إضافة المنتج

</button>


</div>



<h2>
قائمة المنتجات
</h2>



<div id="products" class="products">

</div>



</div>



<script type="module" src="admin-products.js"></script>


</body>

</html>
