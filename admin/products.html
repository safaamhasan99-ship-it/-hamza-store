<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>إدارة المنتجات - مجمع حمزه الشطري</title>


<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}


body{

background:#f5f7fb;
padding:20px;

}


.container{

max-width:1200px;
margin:auto;

}



h1{

background:#111;
color:white;
padding:20px;
border-radius:12px;
text-align:center;
margin-bottom:25px;

}



.form{

background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 20px #ddd;
margin-bottom:30px;

}



input,
select,
textarea{

width:100%;
padding:13px;
margin-bottom:12px;
border:1px solid #ddd;
border-radius:10px;
font-size:16px;

}



textarea{

height:100px;
resize:none;

}



button{

background:#c79b3b;
color:white;
border:none;
padding:12px 25px;
border-radius:10px;
cursor:pointer;
font-size:16px;
font-weight:bold;

}



button:hover{

opacity:.85;

}



.products{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;

}



.card{

background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 20px #ddd;

}



.card img{

width:100%;
height:220px;
object-fit:cover;

}



.card-body{

padding:15px;

}



.card h3{

margin-bottom:10px;

}



.price{

color:#c79b3b;
font-size:18px;
font-weight:bold;

}



.category{

margin:8px 0;
color:#555;

}



.actions{

display:flex;
gap:10px;
margin-top:15px;

}



.edit{

background:#1976d2;

}



.delete{

background:#e53935;

}



@media(max-width:600px){

body{

padding:10px;

}


.card img{

height:180px;

}

}

</style>


</head>


<body>


<div class="container">


<h1>
إدارة منتجات مجمع حمزه الشطري
</h1>



<div class="form">


<input 
id="name"
placeholder="اسم المنتج">



<input 
id="price"
type="number"
placeholder="السعر">



<input 
id="imageFile"
type="file"
accept="image/*">



<select id="category">

<option value="رجالي">
القسم الرجالي
</option>


<option value="نسائي">
القسم النسائي
</option>


<option value="ولادي">
القسم الولادي
</option>


<option value="بناتي">
القسم البناتي
</option>


<option value="جوارب">
قسم الجوارب
</option>


<option value="داخليات">
الداخليات
</option>


</select>



<textarea
id="description"
placeholder="وصف المنتج">
</textarea>



<button id="saveBtn">

إضافة المنتج

</button>


</div>




<h2>
قائمة المنتجات
</h2>



<div 
id="products"
class="products">

</div>



</div>




<script type="module" src="admin-products.js"></script>



</body>

</html>
