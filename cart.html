<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>السلة | مجمع حمزه الشطري</title>


<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">


<link rel="stylesheet" href="style.css">


<style>

body{
font-family:'Cairo',sans-serif;
background:#f5f7fb;
margin:0;
}


.cart-container{

max-width:1000px;
margin:30px auto;
padding:20px;

}


.cart-title{

text-align:center;
font-size:30px;
font-weight:800;
margin-bottom:30px;

}



.product-card{

background:white;
border-radius:15px;
padding:15px;
margin-bottom:20px;
display:flex;
gap:20px;
align-items:center;
box-shadow:0 5px 15px #0001;

}



.product-card img{

width:130px;
height:130px;
object-fit:cover;
border-radius:12px;

}



.product-info{

flex:1;

}



.price{

color:#c28b00;
font-size:20px;
font-weight:bold;

}



.quantity-box{

display:flex;
justify-content:center;
align-items:center;
gap:15px;
margin:15px 0;

}



.cart-btn{

border:none;
background:#222;
color:white;
width:35px;
height:35px;
border-radius:50%;
cursor:pointer;

}



.favorite{

border:none;
background:#e74c3c;
color:white;
padding:10px 15px;
border-radius:10px;
cursor:pointer;

}



.about-box{

background:white;
padding:30px;
border-radius:15px;
text-align:center;

}



.total-box{

background:white;
padding:20px;
border-radius:15px;
margin-top:20px;
text-align:center;
font-size:25px;
font-weight:bold;

}



.order-btn{

display:block;
background:#25d366;
color:white;
text-align:center;
padding:15px;
border-radius:12px;
margin-top:20px;
font-size:20px;
font-weight:bold;
text-decoration:none;

}



@media(max-width:600px){

.product-card{

flex-direction:column;
text-align:center;

}


.product-card img{

width:180px;
height:180px;

}

}

</style>


</head>



<body>



<div class="cart-container">


<h1 class="cart-title">

🛒 سلة المشتريات

</h1>



<div id="cartList">

</div>



<div class="total-box">

المجموع:
<span id="total">
0 د.ع
</span>

</div>



<a id="orderWhatsapp"
class="order-btn"
target="_blank">

إتمام الطلب عبر واتساب

</a>



</div>





<script src="cart.js"></script>


</body>

</html>
