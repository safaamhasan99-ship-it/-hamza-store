<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>السلة | مجمع حمزه الشطري</title>

<meta name="theme-color" content="#111827">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<header class="header">

<div class="brand">

<img src="images/logo.png" alt="مجمع حمزه الشطري">

<div>

<h1>مجمع حمزه الشطري</h1>

<p>سلة التسوق</p>

</div>

</div>

<div class="header-icons">

<a href="index.html" class="header-btn">

<i class="fa-solid fa-house"></i>

</a>

<a href="favorites.html" class="header-btn">

<i class="fa-regular fa-heart"></i>

</a>

</div>

</header>

<section class="search-box">

<i class="fa-solid fa-cart-shopping"></i>

<input type="text" value="مراجعة الطلب" readonly>

</section>

<main class="cart-page">

<div id="cartItems" class="cart-list">

<!-- يتم عرض المنتجات هنا -->

</div>
<!-- ملخص الطلب -->

<div class="cart-summary">

<h2>
ملخص الطلب
</h2>

<div class="summary-item">

<span>عدد المنتجات</span>

<strong id="itemsCount">0</strong>

</div>

<div class="summary-item">

<span>الإجمالي</span>

<strong id="totalPrice">0 د.ع</strong>

</div>

</div>

<!-- بيانات العميل -->

<section class="checkout-form">

<h2 class="section-title">

بيانات العميل

</h2>

<div class="form-group">

<label>

الاسم الكامل

</label>

<input
type="text"
id="customerName"
placeholder="اكتب الاسم الكامل">

</div>

<div class="form-group">

<label>

رقم الهاتف

</label>

<input
type="tel"
id="customerPhone"
placeholder="07xxxxxxxxx">

</div>

<div class="form-group">

<label>

المحافظة

</label>

<input
type="text"
id="customerCity"
placeholder="مثال: بغداد">

</div>

<div class="form-group">

<label>

العنوان

</label>

<input
type="text"
id="customerAddress"
placeholder="المنطقة / الشارع">

</div>

<div class="form-group">

<label>

ملاحظات

</label>

<textarea
id="customerNotes"
placeholder="أي ملاحظات إضافية..."></textarea>

</div>

<button
id="checkoutBtn"
class="checkout-btn">

<i class="fa-brands fa-whatsapp"></i>

إرسال الطلب عبر واتساب

</button>

</section>
<!-- قالب عنصر السلة -->

<template id="cartItemTemplate">

<div class="cart-item">

<div class="cart-image">

<img class="cart-product-image"
src="images/no-image.png"
alt="">

</div>

<div class="cart-content">

<h3 class="cart-product-name">
اسم المنتج
</h3>

<p class="cart-product-price">
0 د.ع
</p>

<div class="cart-qty">

<button class="qty-minus">

<i class="fa-solid fa-minus"></i>

</button>

<span class="qty-value">
1
</span>

<button class="qty-plus">

<i class="fa-solid fa-plus"></i>

</button>

</div>

</div>

<button class="delete-item">

<i class="fa-solid fa-trash"></i>

</button>

</div>

</template>

<!-- السلة الفارغة -->

<div
id="emptyCart"
class="empty-state"
style="display:none;">

<i class="fa-solid fa-cart-shopping"></i>

<h2>
السلة فارغة
</h2>

<p>
لم تقم بإضافة أي منتج بعد.
</p>

<a href="products.html" class="hero-btn">

ابدأ التسوق

</a>

</div>

</main>

<!-- إشعارات -->

<div class="toast" id="toast">

تمت إضافة المنتج

</div>

<!-- زر العودة للأعلى -->

<button class="scroll-top">

<i class="fa-solid fa-arrow-up"></i>

</button>

<!-- القائمة السفلية -->

<nav class="bottom-nav">

<a href="index.html">

<i class="fa-solid fa-house"></i>

<span>الرئيسية</span>

</a>

<a href="products.html">

<i class="fa-solid fa-store"></i>

<span>المنتجات</span>

</a>

<a href="favorites.html">

<i class="fa-regular fa-heart"></i>

<span>المفضلة</span>

</a>

<a href="cart.html" class="active">

<i class="fa-solid fa-cart-shopping"></i>

<span>السلة</span>

</a>

</nav>

<script src="js/cart.js"></script>

</body>

</html>
