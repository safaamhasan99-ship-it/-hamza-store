<script src="script.js"></script>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

const cartList = document.getElementById("cartList");
const totalBox = document.getElementById("total");
const orderBtn = document.getElementById("orderWhatsapp");

function showCart(){

cartList.innerHTML = "";

let total = 0;
let message = "السلام عليكم، أريد طلب:%0A%0A";

if(cart.length===0){

cartList.innerHTML=`
<div class="about-box">
<h2>🛒 السلة فارغة</h2>
</div>
`;

totalBox.innerHTML="0 د.ع";

orderBtn.href="#";

return;

}
  cart.forEach((item,index)=>{

let price = Number(item.price) || 0;
let quantity = item.quantity || 1;
let itemTotal = price * quantity;

total += itemTotal;

message +=
`• ${item.name}
الكمية: ${quantity}
السعر: ${price} د.ع
--------------------
`;

cartList.innerHTML += `

<div class="product-card">

<img src="${item.image}" alt="${item.name}">

<div class="product-info">

<h3>${item.name}</h3>

<p class="price">${price} د.ع</p>

<div style="display:flex;justify-content:center;align-items:center;gap:12px;margin:15px 0;">

<button class="cart-btn"
onclick="changeQuantity(${index},-1)">

➖

</button>

<span style="font-size:20px;font-weight:bold;">
${quantity}
</span>

<button class="cart-btn"
onclick="changeQuantity(${index},1)">

➕

</button>

</div>

<p style="margin-bottom:15px;font-weight:bold;">
المجموع: ${itemTotal} د.ع
</p>

<button class="favorite"
onclick="removeCart(${index})">

🗑 حذف المنتج

</button>

</div>

</div>

`;

});
  totalBox.innerHTML = total + " د.ع";

message += "%0A💰 المجموع الكلي: " + total + " د.ع";

orderBtn.href =
"https://wa.me/9647813555538?text=" + message;

}

function changeQuantity(index,value){

cart[index].quantity =
(cart[index].quantity || 1) + value;

if(cart[index].quantity <= 0){

cart.splice(index,1);

}

localStorage.setItem("cart",JSON.stringify(cart));

updateCartCount();

showCart();

}

function removeCart(index){

cart.splice(index,1);

localStorage.setItem("cart",JSON.stringify(cart));

updateCartCount();

showCart();

}

showCart();

</script>
