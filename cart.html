<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سلة التسوق | مجمع حمزة الشطري</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#000;
color:#fff;
padding:20px;
text-align:center;
font-size:26px;
font-weight:bold;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.cart-item{
background:#fff;
display:flex;
align-items:center;
justify-content:space-between;
padding:15px;
margin-bottom:15px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,.1);
}

.cart-item img{
width:90px;
height:90px;
object-fit:cover;
border-radius:10px;
}

.info{
flex:1;
margin-right:15px;
}

.info h3{
margin-bottom:8px;
}

.price{
color:#009688;
font-size:18px;
font-weight:bold;
}

.remove{
background:red;
color:white;
border:none;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
}

.total{
background:white;
padding:20px;
border-radius:12px;
margin-top:20px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.checkout{
display:block;
width:100%;
background:#000;
color:white;
text-align:center;
padding:16px;
margin-top:20px;
text-decoration:none;
font-size:20px;
border-radius:10px;
}

.empty{
text-align:center;
padding:60px;
font-size:24px;
color:#777;
}
</style>

</head>

<body>

<header>
🛒 سلة التسوق
</header>

<div class="container">

<div id="cartItems"></div>

<div class="total">
الإجمالي:
<span id="totalPrice">0</span>
د.ع
</div>

<a href="checkout.html" class="checkout">
إتمام الطلب
</a>

</div>

<script>

let cart=JSON.parse(localStorage.getItem("cart"))||[];

const cartItems=document.getElementById("cartItems");

const totalPrice=document.getElementById("totalPrice");

function loadCart(){

cartItems.innerHTML="";

let total=0;

if(cart.length==0){

cartItems.innerHTML='<div class="empty">السلة فارغة</div>';

document.querySelector(".checkout").style.display="none";

return;

}

cart.forEach((item,index)=>{

total+=Number(item.price);

cartItems.innerHTML+=`

<div class="cart-item">

<img src="${item.image}" alt="">

<div class="info">

<h3>${item.name}</h3>

<div class="price">${item.price} د.ع</div>

</div>

<button class="remove" onclick="removeItem(${index})">

حذف

</button>

</div>

`;

});

totalPrice.innerHTML=total;

}

function removeItem(index){

cart.splice(index,1);

localStorage.setItem("cart",JSON.stringify(cart));

loadCart();

}

loadCart();

</script>

</body>
</html>
