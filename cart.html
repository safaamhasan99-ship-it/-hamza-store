<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>سلة المشتريات - مجمع حمزه الشطري</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}


body{
background:#111;
color:white;
}


header{
background:#000;
padding:20px;
text-align:center;
border-bottom:2px solid gold;
}


header h1{
color:gold;
}


.menu{

background:#222;
padding:15px;
text-align:center;

}


.menu a{

color:white;
text-decoration:none;
margin:10px;

}



#cart{

padding:20px;

}



.item{

background:#222;
border-radius:15px;
padding:15px;
margin-bottom:15px;
display:flex;
align-items:center;
gap:15px;

}



.item img{

width:100px;
height:100px;
object-fit:cover;
border-radius:10px;

}



.price{

color:#00ff99;
font-weight:bold;

}



button{

background:#e91e63;
color:white;
border:none;
padding:10px;
border-radius:20px;
cursor:pointer;

}



.order{

display:block;
background:#25D366;
color:white;
text-align:center;
padding:15px;
border-radius:30px;
text-decoration:none;
margin:20px;

}



footer{

background:#000;
text-align:center;
padding:20px;

}



@media(max-width:600px){

.item{

flex-direction:column;
text-align:center;

}

}

</style>

</head>


<body>


<header>

<h1>🛒 سلة المشتريات</h1>

<p>مجمع حمزه الشطري</p>

</header>



<div class="menu">

<a href="index.html">🏠 الرئيسية</a>

<a href="favorites.html">❤️ المفضلة</a>

</div>



<div id="cart"></div>



<a class="order" href="https://wa.me/9647813555538">
💬 إرسال الطلب عبر واتساب
</a>



<footer>

<p>ذي قار - الشطرة</p>

<p>📞 07813555538</p>

</footer>




<script>


let cartBox=document.getElementById("cart");


let cart=JSON.parse(localStorage.getItem("cart")) || [];



if(cart.length==0){

cartBox.innerHTML="<h2 style='text-align:center;color:gold'>السلة فارغة</h2>";

}


cart.forEach(function(item,index){


cartBox.innerHTML += `

<div class="item">

<img src="${item.image}">

<div>

<h2>${item.name}</h2>

<p class="price">${item.price}</p>

<button onclick="removeItem(${index})">
حذف
</button>

</div>

</div>

`;

});




function removeItem(index){

cart.splice(index,1);

localStorage.setItem("cart",JSON.stringify(cart));

location.reload();

}


</script>



</body>

</html>
