<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<link rel="stylesheet" href="style.css">

</head>


<body>



<header class="header">


<div class="brand">


<img src="5FBF3B90-553B-424D-A9B1-1BE2F7F9362B.png">


<div>

<h1>
مجمع حمزه الشطري
</h1>

<p>
سلة المشتريات
</p>


</div>


</div>


</header>





<section class="products">


<h2 class="title">
🛒 سلة المشتريات
</h2>



<div id="cartList" class="products-grid">


</div>



<div class="about-box">


<h2>
المجموع
</h2>


<h2 id="total">
0 د.ع
</h2>



<a class="wholesale"
href="https://wa.me/9647813555538">

إتمام الطلب عبر واتساب

</a>


</div>


</section>





<nav class="bottom-nav">


<a href="index.html">
🏠 الرئيسية
</a>


<a href="products.html">
🛍 المنتجات
</a>


<a href="cart.html">
🛒 السلة
</a>


<a href="favorites.html">
❤️ المفضلة
</a>


</nav>





<script src="script.js"></script>


<script>


let cart = JSON.parse(localStorage.getItem("cart")) || [];


let cartList=document.getElementById("cartList");

let totalBox=document.getElementById("total");

let total=0;



function showCart(){


cartList.innerHTML="";


total=0;



if(cart.length===0){


cartList.innerHTML=`

<div class="about-box">

<h2>
السلة فارغة 🛒
</h2>

</div>

`;


totalBox.innerHTML="0 د.ع";


return;


}




cart.forEach((item,index)=>{


let price=Number(item.price)||0;


let quantity=item.quantity||1;


let itemTotal=price*quantity;


total+=itemTotal;



cartList.innerHTML+=`


<div class="product-card">


<img src="${item.image}">


<div class="product-info">


<h3>
${item.name}
</h3>


<p class="price">
${price} د.ع
</p>


<p>
الكمية: ${quantity}
</p>



<button class="cart-btn"

onclick="removeCart(${index})">

❌ حذف

</button>



</div>


</div>


`;


});



totalBox.innerHTML=total+" د.ع";


}




function removeCart(index){


cart.splice(index,1);


localStorage.setItem("cart",JSON.stringify(cart));


showCart();


}



showCart();


</script>



</body>

</html>
