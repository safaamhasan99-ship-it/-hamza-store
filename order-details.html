<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>تفاصيل الطلب</title>


<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}


body{

background:#f5f7fb;
padding:20px;

}


.container{

max-width:900px;
margin:auto;

}


.box{

background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 20px #ddd;
margin-bottom:20px;

}


h1{

background:#111;
color:white;
padding:20px;
border-radius:12px;
text-align:center;

}



.item{

border-bottom:1px solid #eee;
padding:15px;

}



img{

width:80px;
height:80px;
object-fit:cover;
border-radius:10px;

}


.price{

color:#c79b3b;
font-weight:bold;

}


</style>


</head>


<body>


<div class="container">


<h1>
تفاصيل الطلب
</h1>


<div class="box" id="customer">

</div>


<div class="box" id="products">

</div>



</div>



<script type="module" src="order-details.js"></script>


</body>

</html>
