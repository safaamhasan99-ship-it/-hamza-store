<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>دخول الإدارة | مجمع حمزه الشطري</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f5f7fb;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.login-card{
width:100%;
max-width:420px;
background:#fff;
border-radius:20px;
padding:35px;
box-shadow:0 15px 35px rgba(0,0,0,.08);
text-align:center;
}

.logo{
width:100px;
height:100px;
border-radius:50%;
object-fit:cover;
margin:auto;
margin-bottom:20px;
border:4px solid #c79b3b;
}

h1{
font-size:30px;
margin-bottom:8px;
}

.subtitle{
color:#777;
margin-bottom:30px;
}

.form-group{
margin-bottom:18px;
text-align:right;
}

.form-group label{
display:block;
margin-bottom:8px;
font-weight:700;
}

.form-group input{
width:100%;
padding:14px;
border:1px solid #ddd;
border-radius:10px;
font-size:16px;
outline:none;
transition:.3s;
}

.form-group input:focus{
border-color:#c79b3b;
}

.password-box{
position:relative;
}

#togglePassword{
position:absolute;
left:15px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
font-size:14px;
color:#666;
}

#error{
display:none;
margin-bottom:15px;
background:#ffe5e5;
color:#d11;
padding:12px;
border-radius:10px;
font-size:15px;
}

#loginBtn{
width:100%;
padding:15px;
background:#c79b3b;
color:#fff;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

#loginBtn:hover{
background:#b3872e;
}
  </style>

</head>

<body>

<div class="login-card">

<img
src="5FBF3B90-553B-424D-A9B1-1BE2F7F9362B.png"
class="logo"
alt="مجمع حمزه الشطري">

<h1>دخول الإدارة</h1>

<p class="subtitle">
يرجى تسجيل الدخول للمتابعة
</p>

<div id="error"></div>

<div class="form-group">

<label>البريد الإلكتروني</label>

<input
id="email"
type="email"
placeholder="example@email.com">

</div>

<div class="form-group">

<label>كلمة المرور</label>

<div class="password-box">

<input
id="password"
type="password"
placeholder="********">

<span id="togglePassword">
👁
</span>

</div>

</div>

<button id="loginBtn">

تسجيل الدخول

</button>

</div>

<script>

const password=document.getElementById("password");

const toggle=document.getElementById("togglePassword");

toggle.onclick=function(){

password.type=password.type==="password"?"text":"password";

toggle.textContent=password.type==="password"?"👁":"🙈";

};

</script>

<script type="module" src="admin-login.js"></script>

</body>

</html>
