<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>دخول الإدارة</title>


<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}


body{

background:#f5f7fb;
height:100vh;
display:flex;
align-items:center;
justify-content:center;

}


.login{

background:white;
width:350px;
padding:30px;
border-radius:15px;
box-shadow:0 5px 25px #ddd;
text-align:center;

}


h1{

margin-bottom:20px;

}


input{

width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ddd;
border-radius:8px;

}


button{

width:100%;
padding:12px;
background:#c79b3b;
color:white;
border:0;
border-radius:8px;
font-size:17px;
cursor:pointer;

}

</style>

</head>


<body>


<div class="login">


<h1>
دخول المدير
</h1>



<input id="email" type="email" placeholder="البريد الإلكتروني">


<input id="password" type="password" placeholder="كلمة المرور">


<button id="loginBtn">

دخول

</button>


</div>



<script type="module" src="admin-login.js"></script>


</body>

</html>
