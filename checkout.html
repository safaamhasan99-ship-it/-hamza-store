<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إتمام الطلب | مجمع حمزه الشطري</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<style>

.container{
max-width:650px;
margin:40px auto;
background:#fff;
padding:30px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.container h1{
text-align:center;
margin-bottom:25px;
}

.form-group{
margin-bottom:18px;
}

.form-group label{
display:block;
margin-bottom:8px;
font-weight:700;
}

.form-group input,
.form-group textarea,
.form-group select{

width:100%;
padding:14px;
border:1px solid #ddd;
border-radius:12px;
font-size:16px;
outline:none;

}

.total-box{

background:#f8fafc;
padding:18px;
border-radius:12px;
margin:20px 0;
font-size:20px;
font-weight:800;
text-align:center;

}

button{

width:100%;
padding:16px;
background:#0ea5e9;
color:#fff;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
cursor:pointer;

}

button:hover{

background:#0284c7;

}

</style>

</head>

<body>

<div class="container">

<h1>إتمام الطلب</h1>

<div class="form-group">
<label>الاسم الكامل</label>
<input id="name" type="text">
</div>

<div class="form-group">
<label>رقم الهاتف</label>
<input id="phone" type="tel">
</div>

<div class="form-group">
<label>المحافظة</label>
<select id="city">

<option value="">اختر المحافظة</option>

<option>بغداد</option>
<option>البصرة</option>
<option>ذي قار</option>
<option>النجف</option>
<option>كربلاء</option>
<option>بابل</option>
<option>واسط</option>
<option>ميسان</option>
<option>المثنى</option>
<option>الديوانية</option>
<option>ديالى</option>
<option>كركوك</option>
<option>نينوى</option>
<option>صلاح الدين</option>
<option>الأنبار</option>
<option>دهوك</option>
<option>أربيل</option>
<option>السليمانية</option>

</select>

</div>
<div class="form-group">
<label>العنوان الكامل</label>
<textarea
id="address"
rows="4"
placeholder="الحي، الشارع، أقرب نقطة دالة"></textarea>
</div>

<div class="form-group">
<label>ملاحظات (اختياري)</label>
<textarea
id="notes"
rows="3"
placeholder="أي ملاحظات إضافية على الطلب"></textarea>
</div>

<div class="total-box">

إجمالي الطلب:
<span id="orderTotal">0</span>
د.ع

</div>

<button id="sendOrderBtn">

إرسال الطلب

</button>

</div>

<script>

const cart =
JSON.parse(localStorage.getItem("cart")) || [];

let total = 0;

cart.forEach(item=>{

total += (Number(item.price)||0) * (item.quantity || 1);

});

document.getElementById("orderTotal").textContent = total;

</script>

<script type="module" src="js/checkout.js"></script>

</body>

</html>
