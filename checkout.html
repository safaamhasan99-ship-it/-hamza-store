<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إتمام الطلب | مجمع حمزة الشطري</title>

<style>
body{
font-family:Tahoma,sans-serif;
background:#f5f5f5;
margin:0;
padding:0;
}

.container{
max-width:600px;
margin:40px auto;
background:#fff;
padding:25px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

h1{
text-align:center;
margin-bottom:20px;
}

input,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:15px;
background:#000;
color:#fff;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#222;
}
</style>

</head>
<body>

<div class="container">

<h1>إتمام الطلب</h1>

<input type="text" id="name" placeholder="الاسم الكامل">

<input type="tel" id="phone" placeholder="رقم الهاتف">

<textarea id="address" rows="4" placeholder="العنوان الكامل"></textarea>

<button onclick="sendOrder()">
إرسال الطلب عبر واتساب
</button>

</div>

<script>

function sendOrder(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let address=document.getElementById("address").value;

let cart=JSON.parse(localStorage.getItem("cart"))||[];

if(name==""||phone==""||address==""){
alert("يرجى ملء جميع الحقول");
return;
}

let message="*طلب جديد من الموقع*%0A%0A";

message+="الاسم: "+name+"%0A";
message+="الهاتف: "+phone+"%0A";
message+="العنوان: "+address+"%0A%0A";

message+="المنتجات:%0A";

let total=0;

cart.forEach(function(item){

message+="• "+item.name+" - "+item.price+" د.ع%0A";
total+=Number(item.price);

});

message+="%0Aالإجمالي: "+total+" د.ع";

window.open("https://wa.me/9647813555538?text="+message,"_blank");

}

</script>

</body>
</html>
