<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إتمام الطلب | مجمع حمزه الشطري</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f5f5f5;
}

.container{
max-width:600px;
margin:40px auto;
background:#fff;
padding:25px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

h1{
text-align:center;
margin-bottom:20px;
color:#111;
}

input,
textarea{
width:100%;
padding:14px;
margin:12px 0;
border:1px solid #ddd;
border-radius:8px;
font-size:16px;
outline:none;
}

input:focus,
textarea:focus{
border-color:#FFC107;
}

button{
width:100%;
padding:15px;
background:#111;
color:#fff;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
font-weight:bold;
transition:.3s;
}

button:hover{
background:#FFC107;
color:#111;
}

</style>

</head>

<body>

<div class="container">

<h1>إتمام الطلب</h1>

<input
type="text"
id="name"
placeholder="الاسم الكامل">

<input
type="tel"
id="phone"
placeholder="رقم الهاتف">

<textarea
id="address"
rows="4"
placeholder="العنوان الكامل"></textarea>

<button onclick="sendOrder()">
إرسال الطلب
</button>

</div>

<script type="module" src="js/checkout.js"></script>

</body>

</html>
