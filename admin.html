<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>لوحة إدارة المنتجات | مجمع حمزه الشطري</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<style>

.admin-page{
max-width:1200px;
margin:30px auto;
padding:20px;
}

.admin-box{
background:#fff;
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
margin-bottom:30px;
}

.form-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

.form-group{
display:flex;
flex-direction:column;
}

.form-group label{
margin-bottom:8px;
font-weight:700;
}

input,select,textarea{
padding:14px;
border:1px solid #ddd;
border-radius:12px;
font-size:15px;
}

textarea{
height:120px;
}

#saveBtn{
width:100%;
padding:16px;
margin-top:20px;
background:#0ea5e9;
color:#fff;
border:0;
border-radius:12px;
font-size:18px;
cursor:pointer;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:20px;
}

.card{
background:#fff;
border-radius:18px;
overflow:hidden;
box-shadow:0 10px 20px #ddd;
}

.card img{
width:100%;
height:250px;
object-fit:cover;
}

.card-body{
padding:15px;
}

</style>

</head>

<body>

<header class="header">

<h1>مجمع حمزه الشطري</h1>
<p>لوحة إدارة المنتجات</p>

</header>

<div class="admin-page">

<div class="admin-box">

<h2>إضافة منتج جديد</h2>

<div class="form-grid">

<div class="form-group">
<label>اسم المنتج</label>
<input id="name" type="text">
</div>

<div class="form-group">
<label>السعر</label>
<input id="price" type="number">
</div>

<div class="form-group">
<label>القسم</label>

<select id="category">
