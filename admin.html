<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>لوحة إدارة المنتجات | مجمع حمزه الشطري</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<style>

.admin-page{
max-width:1200px;
margin:30px auto;
padding:20px;
}

.admin-box{
background:#fff;
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
margin-bottom:30px;
}

.admin-box h2{
margin-bottom:20px;
font-size:28px;
}

.form-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

.form-group{
display:flex;
flex-direction:column;
}

.form-group label{
margin-bottom:8px;
font-weight:700;
}

.form-group input,
.form-group select,
.form-group textarea{
padding:14px;
border:1px solid #ddd;
border-radius:12px;
font-size:15px;
outline:none;
}

.form-group textarea{
height:120px;
resize:none;
}

#saveBtn{
width:100%;
padding:16px;
margin-top:20px;
background:#0ea5e9;
color:#fff;
border:none;
border-radius:12px;
font-size:18px;
font-weight:700;
cursor:pointer;
}

#saveBtn:hover{
background:#0284c7;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:20px;
}

.card{
background:#fff;
border-radius:18px;
overflow:hidden;
box-shadow:0 10px 20px rgba(0,0,0,.08);
}

.card img{
width:100%;
height:250px;
object-fit:cover;
}

.card-body{
padding:18px;
}

.actions{
display:flex;
gap:10px;
margin-top:15px;
}

.edit{
flex:1;
background:#f59e0b;
color:#fff;
padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
}

.delete{
flex:1;
background:#ef4444;
color:#fff;
padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
}

.offer-badge{
display:inline-block;
background:#22c55e;
color:#fff;
padding:6px 12px;
border-radius:20px;
margin-top:10px;
font-size:13px;
font-weight:700;
}

</style>

</head>

<body>

<header class="header">

<div class="brand">

<img src="5FBF3B90-553B-424D-A9B1-1BE2F7F9362B.png">

<div>

<h1>مجمع حمزه الشطري</h1>

<p>لوحة إدارة المنتجات</p>

</div>

</div>

</header>

<div class="admin-page">

<div class="admin-box">

<h2>إضافة / تعديل منتج</h2>

<div class="form-grid">
  <div class="form-group">
<label>اسم المنتج</label>
<input type="text" id="name" placeholder="اسم المنتج">
</div>

<div class="form-group">
<label>السعر (د.ع)</label>
<input type="number" id="price" placeholder="السعر">
</div>

<div class="form-group">
<label>القسم</label>
<select id="category">
<option value="رجالي">رجالي</option>
<option value="نسائي">نسائي</option>
<option value="ولادي">ولادي</option>
<option value="بناتي">بناتي</option>
<option value="جوارب">جوارب</option>
<option value="داخليات">داخليات</option>
<option value="حقائب">حقائب</option>
</select>
</div>

<div class="form-group">
<label>المقاسات</label>
<input type="text" id="sizes" placeholder="مثال: M,L,XL أو 36-45">
</div>

<div class="form-group">
<label>الألوان</label>
<input type="text" id="colors" placeholder="أسود، أبيض، كحلي">
</div>

<div class="form-group">
<label>الكمية</label>
<input type="number" id="quantity" value="0">
</div>

<div class="form-group">
<label>صورة المنتج</label>
<input type="file" id="imageFile" accept="image/*">
</div>

<div class="form-group" style="grid-column:1/-1;">
<label>وصف المنتج</label>
<textarea id="description" placeholder="اكتب وصف المنتج"></textarea>
</div>

<div class="form-group" style="grid-column:1/-1;">
<label>
<input type="checkbox" id="offer">
إضافة المنتج إلى قسم العروض
</label>
</div>

<button id="saveBtn">
إضافة المنتج
</button>

</div>

</div>

<div class="admin-box">

<h2>المنتجات</h2>

<div id="products" class="cards">

</div>

</div>
</div>

<footer class="footer">

<img class="footer-logo"
src="5FBF3B90-553B-424D-A9B1-1BE2F7F9362B.png"
alt="الشعار">

<h3>مجمع حمزه الشطري</h3>

<p>لوحة تحكم إدارة المنتجات</p>

<p>جميع الحقوق محفوظة © 2026</p>

</footer>

<script type="module" src="admin-products.js"></script>

</body>

</html>
