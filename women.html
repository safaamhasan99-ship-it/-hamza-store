<script type="module">

import { db } from "./js/firebase.js";

import {
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

async function loadWomenProducts(){

const grid=document.getElementById("productsGrid");

grid.innerHTML="";

const snap=await getDocs(collection(db,"products"));

let found=false;

snap.forEach(doc=>{

const p=doc.data();

const category = (p.category || "").trim().toLowerCase();

const validCategories = [
  "women",
  "نسائي",
  "قسم النسائي"
].map(c => c.toLowerCase());

if (!validCategories.some(c => category.includes(c))) return;

found=true;

grid.innerHTML += `
<div class="product-card">

<div class="product-image">
<img src="${p.image}" alt="${p.name}">
</div>

<div class="product-info">

<h3 class="product-title">
${p.name}
</h3>

<div class="product-price">
${Number(p.price).toLocaleString()} د.ع
</div>

<div class="product-actions">

<button class="add-cart"
onclick="addToCart('${p.name}',${p.price},'${p.image}')">
<i class="fa-solid fa-cart-shopping"></i>
إضافة للسلة
</button>

<a href="details.html?id=${doc.id}" class="details-btn">
عرض التفاصيل
</a>

</div>

</div>

</div>
`;

});

if(!found){

grid.innerHTML=`

<div class="loading-products">

لا توجد منتجات في القسم النسائي

</div>

`;

}

}

loadWomenProducts();

</script>
